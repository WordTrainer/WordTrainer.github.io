<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临时停车-付费1元解锁挪车拨号</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", Arial, sans-serif;
            max-width: 480px;
            margin: 30px auto;
            padding: 20px;
            background: #f5f5f5;
            text-align: center;
        }
        .container {
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        /* 收款码区域 - 唯一初始显示区 */
        .pay-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px dashed #07c160;
            border-radius: 10px;
            background: #f8fffa;
        }
        .pay-title {
            font-size: 18px;
            color: #07c160;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .pay-desc {
            font-size: 15px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .dev-tip {
            color: #ff5500;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }
        #pay-code {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #pay-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        /* 开发者解锁密码框 - 仅开发者可见 */
        .dev-unlock {
            margin: 20px 0;
            display: none; /* 默认隐藏，仅开发者知道触发方式 */
        }
        #unlock-pwd {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 10px;
        }
        #unlock-btn {
            padding: 8px 20px;
            background: #666;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        /* 手机号输入区 - 默认隐藏，解锁后显示 */
        .phone-section {
            display: none;
            margin: 20px 0;
        }
        #phone-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 18px;
            border: 2px solid #eee;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }
        #phone-input:focus {
            border-color: #0088ff;
        }
        .confirm-phone-btn {
            padding: 12px 30px;
            background: #0088ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        /* 拨号二维码区域 - 默认隐藏，确认号码后显示 */
        .dial-qr-section {
            display: none;
            margin-top: 20px;
        }
        .qr-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 500;
        }
        #qrcode-container {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            background: #fff;
            image-rendering: pixelated;
        }
        /* 解锁成功提示 */
        .unlock-tip {
            color: #07c160;
            font-size: 16px;
            font-weight: 600;
            margin: 15px 0;
            display: none;
        }
    </style>
    <div class="container">
        <h2>临时停车-付费1元解锁挪车拨号</h2>

        <!-- 收款码区域 - 仅展示，无确认按钮 -->
        <div class="pay-section">
            <div class="pay-title">📢 请先支付1元解锁挪车拨号权限</div>
            <div class="pay-desc">
                1. 微信扫描下方付款码支付1元<br>
                2. 开发者微信号：<strong>18811049940</strong> 手机确认到账后解锁<br>
                3. 解锁后输入手机号，确认生成拨号二维码
            </div>
            <div class="dev-tip">* 付款后请等待开发者确认到账</div>
            <div id="pay-code">
              <img src="./wechat-pay-qr.png" alt="微信收款码">     
            </div>
        </div>

        <!-- 开发者专属解锁框（默认隐藏，按F12调出控制台输入 showUnlock() 显示） -->
        <div class="dev-unlock" id="dev-unlock">
            <input type="password" id="unlock-pwd" placeholder="输入开发者解锁密码">
            <button id="unlock-btn" onclick="checkUnlockPwd()">解锁输入框</button>
        </div>

        <!-- 解锁成功提示 -->
        <div class="unlock-tip" id="unlock-tip">
            ✅ 解锁成功！请输入车主手机号
        </div>

        <!-- 手机号输入区 - 解锁后显示 -->
        <div class="phone-section" id="phone-section">
            <input 
                type="tel" 
                id="phone-input" 
                placeholder="请输入11位车主手机号（如13800138000）" 
                maxlength="11"
            >
            <button class="confirm-phone-btn" onclick="generatePhoneQR()">确认生成拨号二维码</button>
        </div>
        
        <!-- 拨号二维码区域 - 确认号码后显示 -->
        <div class="dial-qr-section" id="dial-qr-section">
            <div class="qr-text">临时停车，敬请谅解！挪车请致电：</div>
            <div id="qrcode-container"></div>
        </div>
    </div>

    <script>
        // 开发者解锁密码（可自行修改）
        const DEV_UNLOCK_PWD = "18811049940";
        let isUnlocked = false; // 解锁状态标记

        // ========== 开发者专属：显示解锁框（按F12在控制台输入 showUnlock() 调用） ==========
        function showUnlock() {
            document.getElementById('dev-unlock').style.display = 'block';
            alert('开发者解锁框已显示，请输入密码解锁');
        }

        // ========== 验证开发者解锁密码 ==========
        function checkUnlockPwd() {
            const inputPwd = document.getElementById('unlock-pwd').value.trim();
            if (inputPwd === DEV_UNLOCK_PWD) {
                isUnlocked = true;
                document.getElementById('unlock-tip').style.display = 'block';
                document.getElementById('phone-section').style.display = 'block';
                document.getElementById('dev-unlock').style.display = 'none'; // 解锁后隐藏密码框
                alert('✅ 解锁成功，可输入车主手机号生成二维码');
            } else {
                alert('❌ 解锁密码错误，请重新输入');
                document.getElementById('unlock-pwd').value = '';
            }
        }

        // ========== 生成拨号二维码（输入号码确认后） ==========
        function generatePhoneQR() {
            if (!isUnlocked) {
                alert('❌ 请先等待开发者确认收款并解锁！');
                return;
            }

            const phone = document.getElementById('phone-input').value.trim();
            const phoneReg = /^1[3-9]\d{9}$/;
            
            if (!phoneReg.test(phone)) {
                alert('❌ 请输入有效的11位手机号！');
                return;
            }

            // 显示二维码区域并生成拨号二维码
            document.getElementById('dial-qr-section').style.display = 'block';
            const container = document.getElementById('qrcode-container');
            container.innerHTML = '';

            const dialUrl = `tel:${phone}`;
            new QRCode(container, {
                text: dialUrl,
                width: 280,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H,
                margin: 0
            });
        }
    </script>

</head>
