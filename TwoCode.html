<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临时停车-付费1元解锁挪车拨号</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", Arial, sans-serif;
            max-width: 480px;
            margin: 0 auto 60px;
            padding: 20px;
            background: #f5f5f5;
            text-align: center;
        }
        .container {
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-top: 80px;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .pay-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px dashed #07c160;
            border-radius: 10px;
            background: #f8fffa;
        }
        .pay-title {
            font-size: 18px;
            color: #07c160;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .pay-desc {
            font-size: 15px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .dev-tip {
            color: #ff5500;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }
        #pay-code {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #pay-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .unlock-tip {
            color: #07c160;
            font-size: 16px;
            font-weight: 600;
            margin: 15px 0;
            display: none;
        }
        .phone-section {
            display: none;
            margin: 20px 0;
        }
        #phone-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 18px;
            border: 2px solid #eee;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }
        #phone-input:focus {
            border-color: #0088ff;
        }
        .confirm-phone-btn {
            padding: 12px 30px;
            background: #0088ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .dial-qr-section {
            display: none;
            margin-top: 20px;
        }
        .qr-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 500;
        }
        #qrcode-container {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            background: #fff;
        }
        .top-nav {
            background:#2ea44f;
            padding:15px 20px;
            display:flex;
            gap:15px;
            align-items:center;
            justify-content:center;
            flex-wrap:wrap;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            position:fixed;
            top:0;
            left: 0;
            right: 0;
            z-index:999;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        .nav-link.active {
            font-weight: bold;
            text-decoration: underline;
        }
        .back-btn {
            padding:10px 20px;
            background:#2ea44f;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:30px;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="./index.html" class="nav-link">单词训练</a>
    <a href="./TwoCode.html" class="nav-link active">挪车付费</a>
    <a href="./errorBook.html" class="nav-link">单词错题本</a>
</nav>

<div class="container">
    <h2>临时停车-付费1元解锁挪车拨号</h2>

    <div class="pay-section">
        <div class="pay-title">📢 请先支付1元解锁挪车拨号权限</div>
        <div class="pay-desc">
            1. 微信扫描下方付款码支付1元<br>
            2. 开发者微信号：<strong>18811049940</strong> 确认到账后自动解锁<br>
            3. 解锁后输入手机号，确认生成拨号二维码
        </div>
        <div class="dev-tip">* 付款后请等待自动解锁，无需手动操作</div>
        <div id="pay-code">
            <img src="./wechat-pay-qr.png" alt="微信收款码">     
        </div>
    </div>

    <div class="unlock-tip" id="unlock-tip">
        ✅ 解锁成功！请输入车主手机号
    </div>

    <div class="phone-section" id="phone-section">
        <input 
            type="tel" 
            id="phone-input" 
            placeholder="请输入11位车主手机号（如13800138000）" 
            maxlength="11"
        >
        <button class="confirm-phone-btn" onclick="generatePhoneQR()">确认生成拨号二维码</button>
    </div>
    
    <div class="dial-qr-section" id="dial-qr-section">
        <div class="qr-text">临时停车，敬请谅解！挪车请致电：</div>
        <div id="qrcode-container"></div>
    </div>

    <button class="back-btn" onclick="window.location.href='/'">返回导航主页</button>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    // 解锁状态
    let isUnlocked = false;

    // ==============================================
    // 开发者确认到款 → 直接执行这个函数即可自动解锁
    // 控制台输入：unlockByDev()
    // ==============================================
    function unlockByDev() {
        isUnlocked = true;
        document.getElementById('unlock-tip').style.display = 'block';
        document.getElementById('phone-section').style.display = 'block';
        alert('✅ 支付已确认，自动解锁成功！');
    }

    // 生成手机号二维码
    function generatePhoneQR() {
        if (!isUnlocked) {
            alert('❌ 请先完成支付，等待开发者确认解锁！');
            return;
        }

        const phone = document.getElementById('phone-input').value.trim();
        const phoneReg = /^1[3-9]\d{9}$/;
        
        if (!phoneReg.test(phone)) {
            alert('❌ 请输入有效的11位手机号！');
            return;
        }

        document.getElementById('dial-qr-section').style.display = 'block';
        const container = document.getElementById('qrcode-container');
        container.innerHTML = '';

        new QRCode(container, {
            text: `tel:${phone}`,
            width: 280,
            colorDark: '#000',
            colorLight: '#fff',
            correctLevel: QRCode.CorrectLevel.H
        });
    }
</script>
</body>
</html>
