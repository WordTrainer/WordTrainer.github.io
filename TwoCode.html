<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临时停车-付费1元解锁挪车拨号</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            max-width: 480px;
            margin: 0 auto 60px;
            padding: 20px;
            background: #f5f5f5;
            text-align: center;
        }
        .container {
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-top: 80px;
        }
        h2 { margin-bottom: 25px; font-size: 24px; color: #333; }
        .input-box { margin-bottom: 20px; }
        #userPhone {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: 2px solid #eee;
            border-radius: 8px;
            text-align: center;
            outline: none;
        }
        #userPhone:focus { border-color: #0088ff; }
        .pay-box {
            padding: 20px;
            border: 2px dashed #07c160;
            border-radius: 10px;
            background: #f8fffa;
            margin: 20px 0;
        }
        .pay-title {
            font-size: 18px;
            color: #07c160;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .pay-desc {
            font-size: 15px;
            color: #666;
            line-height: 1.7;
            margin-bottom: 15px;
        }
        #pay-code-img {
            width: 260px;
            height: 260px;
            margin: 0 auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .tip {
            color: #ff5500;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }
        .qrcode-box {
            display: none;
            margin-top: 30px;
        }
        .qrcode-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 500;
        }
        #qrcodeContainer {
            width: 280px;
            height: 280px;
            margin: 0 auto;
        }
        .top-nav {
            background:#2ea44f;
            padding:15px;
            display:flex;
            gap:15px;
            align-items:center;
            justify-content:center;
            position:fixed;
            top:0; left:0; right:0;
            z-index:999;
        }
        .nav-link { color: white; text-decoration: none; font-size: 15px; }
        .nav-link.active { font-weight: bold; }
        .back-btn {
            padding:10px 25px;
            background:#2ea44f;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:30px;
        }
        /* 开发者按钮：默认隐藏，你点5次页面标题显示 */
        .dev-btn {
            display: none;
            padding: 10px 20px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="./index.html" class="nav-link">单词训练</a>
    <a href="./TwoCode.html" class="nav-link active">挪车付费</a>
    <a href="./Piper.html" class="nav-link">地下水水化学分析</a>
</nav>

<div class="container">
    <h2 id="pageTitle">临时停车-付费1元解锁挪车拨号</h2>

    <!-- 第一步：输入手机号 -->
    <div class="input-box">
        <input
            type="tel"
            id="userPhone"
            placeholder="请输入你的11位手机号"
            maxlength="11"
        >
    </div>

    <!-- 第二步：支付 -->
    <div class="pay-box" id="payBox">
        <div class="pay-title">请支付1元生成挪车二维码</div>
        <div class="pay-desc">
            输入手机号 → 扫码支付1元 → 开发者确认 → 自动生成挪车码
        </div>
        <img id="pay-code-img" src="./wechat-pay-qr.png" alt="微信收款码">
        <div class="tip">付款后等待自动生成二维码，无需操作</div>
    </div>

    <!-- 第三步：生成挪车码（自动显示） -->
    <div class="qrcode-box" id="qrcodeBox">
        <div class="qrcode-text">✅ 挪车拨号二维码已生成</div>
        <div id="qrcodeContainer"></div>
        <div style="margin-top:15px; font-size:15px; color:#333;">
            扫码即可拨号挪车
        </div>
    </div>

    <!-- 开发者确认按钮（默认隐藏，你点标题5次显示） -->
    <button class="dev-btn" id="confirmBtn">✅ 确认收款，生成挪车码</button>

    <button class="back-btn" onclick="window.location.href='/'">返回主页</button>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    let userPhone = "";
    let clickCount = 0; // 标题点击计数

    // =========================================
    // 1. 你点标题5次 → 显示“确认收款”按钮
    // =========================================
    document.getElementById("pageTitle").addEventListener("click", function () {
        clickCount++;
        if (clickCount >= 5) {
            document.getElementById("confirmBtn").style.display = "block";
            clickCount = 0; // 重置计数
            alert("✅ 开发者按钮已显示，确认收款请点击");
        }
    });

    // =========================================
    // 2. 你点按钮 → 自动生成该用户手机号的挪车码
    // =========================================
    document.getElementById("confirmBtn").addEventListener("click", confirmPay);

    function confirmPay() {
        userPhone = document.getElementById("userPhone").value.trim();
        const reg = /^1[3-9]\d{9}$/;

        if (!reg.test(userPhone)) {
            alert("请先输入有效的11位手机号！");
            return;
        }

        // 隐藏支付区，显示二维码
        document.getElementById("payBox").style.display = "none";
        document.getElementById("qrcodeBox").style.display = "block";

        // 生成拨号二维码
        const container = document.getElementById("qrcodeContainer");
        container.innerHTML = "";
        new QRCode(container, {
            text: `tel:${userPhone}`,
            width: 280,
            height: 280,
            colorDark: "#000",
            colorLight: "#fff",
            correctLevel: QRCode.CorrectLevel.H
        });

        alert("✅ 已确认收款！挪车二维码已自动生成");
    }
</script>
</body>
</html>
