<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地下水Piper三线图化学分类分析</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.30.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        #plotArea { height: 750px; background: white; border-radius: 8px; padding: 10px; }
        .result-box { height: 220px; overflow-y: auto; background: white; }
        .table-container { max-height: 320px; overflow-y: auto; }
        .btn-back { margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h3 class="text-center mb-4 text-primary">地下水Piper三线图化学分类分析</h3>
        
        <div class="row mb-3">
            <div class="col-auto">
                <button class="btn btn-primary" onclick="selectExcel()">导入Excel数据</button>
                <button class="btn btn-success" onclick="showDivisions()">显示六区划分</button>
                <button class="btn btn-warning" onclick="hideDivisions()">隐藏划分</button>
                <button class="btn btn-info" onclick="exportImage()">导出图片</button>
                <button class="btn btn-dark" onclick="exportExcel()">导出结果Excel</button>
                <button class="btn btn-secondary btn-back" onclick="goHome()">返回主页</button>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div id="plotArea"></div>
            </div>
            <div class="col-lg-4">
                <div class="card mb-3">
                    <div class="card-header">分析结果</div>
                    <div class="card-body result-box" id="resultText"></div>
                </div>
                <div class="card table-container">
                    <div class="card-header">数据表格</div>
                    <table class="table table-sm" id="resultTable">
                        <thead>
                            <tr>
                                <th>序号</th><th>Ca%</th><th>Mg%</th><th>Na+K%</th><th>HCO3+CO3%</th><th>SO4%</th><th>Cl%</th><th>区域</th><th>水化学类型</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
// 摩尔质量常量
const CONST = {
    Ca:40.08, Mg:24.31, K:39.1, Na:22.99,
    HCO3:61.02, CO3:60.01, SO4:96.06, Cl:35.45
};

// 全局变量（极简结构，绝不冲突）
let allPoints = [];
let showDivision = false;
let baseShapes = [];
let dataPoints = [];
let divisionShapes = [];

// 页面加载立即绘图（强制渲染）
window.onload = function() {
    setTimeout(() => {
        drawPiperBase();
        refreshPlot();
    }, 100);
};

// 核心：绘制 Piper 三线图基础框架（100% 必出图）
function drawPiperBase() {
    const s3 = Math.sqrt(3) / 2;
    baseShapes = [];

    // 阳离子三角形
    addShape([[0,0], [1,0], [0.5,s3], [0,0]], 'blue', 3);
    // 阴离子三角形
    addShape([[1.2,0], [2.2,0], [1.7,s3], [1.2,0]], 'red', 3);
    // 顶部菱形
    addShape([[0.5,s3], [1.7,s3], [1.35, s3+0.3], [0.85, s3+0.3], [0.5,s3]], 'green', 2);

    // 网格线
    for(let i=1;i<10;i++){
        let t=i/10;
        addShape([[t,0], [0.5, t*s3]], '#cce5ff',1);
        addShape([[1-t,0], [0.5+t*0.5, t*s3]], '#cce5ff',1);
        addShape([[1.2+t,0], [1.7, t*s3]], '#ffe5e5',1);
        addShape([[2.2-t,0], [1.7-t*0.5, t*s3]], '#ffe5e5',1);
    }
}

// 统一绘图（终极修复）
function refreshPlot() {
    let all = [...baseShapes, ...divisionShapes, ...dataPoints];
    Plotly.newPlot('plotArea', all, {
        title: '地下水 Piper 三线图分析',
        xaxis: { range: [-0.1, 2.5], showgrid: false, zeroline: false },
        yaxis: { range: [-0.1, 1.8], showgrid: false, zeroline: false },
        plot_bgcolor: '#f8fcff',
        margin: { l:30, r:30, t:50, b:30 }
    }, { responsive: true });
}

// 添加线条
function addShape(points, color, width) {
    let x = [], y = [];
    points.forEach(p => { x.push(p[0]); y.push(p[1]); });
    baseShapes.push({
        type: 'scatter', x, y, mode: 'lines',
        line: { color, width },
        showlegend: false,
        hoverinfo: 'skip'
    });
}

// 显示六区划分
function showDivisions() {
    showDivision = true;
    const s3 = Math.sqrt(3)/2;
    divisionShapes = [];
    const zones = [
        {pts:[[0.5,s3],[0.925,s3+0.15],[1.35,s3]], color:'rgba(255,200,200,0.4)', text:'6区'},
        {pts:[[0.925,s3+0.15],[1.35,s3],[1.35,s3+0.15]], color:'rgba(200,200,255,0.4)', text:'9区'},
        {pts:[[0.85,s3+0.3],[0.925,s3+0.15],[1.1,s3+0.3]], color:'rgba(200,255,200,0.4)', text:'5区'},
        {pts:[[1.35,s3],[1.35,s3+0.15],[1.7,s3]], color:'rgba(255,255,200,0.4)', text:'7区'},
        {pts:[[1.1,s3+0.3],[1.35,s3+0.15],[1.35,s3+0.3]], color:'rgba(200,200,255,0.4)', text:'9区'},
        {pts:[[1.1,s3+0.3],[1.35,s3+0.3],[1.7,s3]], color:'rgba(255,200,255,0.4)', text:'8区'}
    ];
    zones.forEach(z => {
        let x=[],y=[];
        z.pts.forEach(p=>{x.push(p[0]);y.push(p[1]);});
        divisionShapes.push({type:'scatter',x,y,mode:'lines',fill:'toself',fillcolor:z.color,line:{color:'black',width:1},showlegend:false});
        divisionShapes.push({type:'scatter',x:[x.reduce((a,b)=>a+b,0)/x.length],y:[y.reduce((a,b)=>a+b,0)/y.length],text:z.text,mode:'text',textfont:{size:10},showlegend:false});
    });
    refreshPlot();
}

// 隐藏分区
function hideDivisions() {
    showDivision = false;
    divisionShapes = [];
    refreshPlot();
}

// 导入 Excel
function selectExcel() {
    const i = document.createElement('input');
    i.type = 'file'; i.accept = '.xlsx,.xls';
    i.onchange = e => {
        const f = new FileReader();
        f.onload = ev => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(ev.target.result).Sheets[0],{header:1});
            processData(data);
        };
        f.readAsArrayBuffer(e.target.files[0]);
    };
    i.click();
}

// 解析数据
function processData(data) {
    allPoints = []; dataPoints = [];
    document.querySelector('#resultText').innerHTML = '';
    document.querySelector('#resultTable tbody').innerHTML = '';
    const s3 = Math.sqrt(3)/2;

    for(let i=1;i<data.length;i++){
        const r=data[i]; if(!r||r.length<9)continue;
        const NO=r[0]||i;
        const ca=+r[1]||0,mg=+r[2]||0,k=+r[3]||0,na=+r[4]||0;
        const hco3=+r[5]||0,co3=+r[6]||0,so4=+r[7]||0,cl=+r[8]||0;

        // 当量计算
        const caE=ca/(CONST.Ca/2),mgE=mg/(CONST.Mg/2),naE=na/CONST.Na,kE=k/CONST.K;
        const hco3E=hco3/CONST.HCO3,co3E=co3/(CONST.CO3/2),so4E=so4/(CONST.SO4/2),clE=cl/CONST.Cl;
        const cTotal=caE+mgE+naE+kE;
        const aTotal=hco3E+co3E+so4E+clE;

        // 百分比
        const caP=(caE/cTotal*100).toFixed(1);
        const mgP=(mgE/cTotal*100).toFixed(1);
        const nkP=((naE+kE)/cTotal*100).toFixed(1);
        const hcP=((hco3E+co3E)/aTotal*100).toFixed(1);
        const soP=(so4E/aTotal*100).toFixed(1);
        const clP=(clE/aTotal*100).toFixed(1);

        // 坐标
        const cx = caP/100*0 + mgP/100*0.5 + nkP/100*1;
        const cy = caP/100*0 + mgP/100*s3 + nkP/100*0;
        const ax = clP/100*1.2 + soP/100*1.7 + hcP/100*2.2;
        const ay = clP/100*0 + soP/100*s3 + hcP/100*0;
        const dx = 0.85 + (nkP/100)*0.5;
        const dy = s3+0.15 - (hcP/100)*0.3;

        // 类型
        const type = dx<1.1&&dy>s3+0.15?"碳酸盐型":dx>1.1&&dy>s3+0.15?"硫酸盐型":dx<1.1?"钙镁型":"钠型";
        const zone = "5/6/7/8/9区";

        allPoints.push({NO,caP,mgP,nkP,hcP,soP,clP,zone,type});
        addPoint(cx,cy,NO,'blue','triangle-up');
        addPoint(ax,ay,NO,'red','triangle-up');
        addPoint(dx,dy,NO,'orange','circle');

        // 输出
        document.querySelector('#resultText').innerHTML += `[${NO}] Ca=${caP}% Mg=${mgP}% Na+K=${nkP}%<br>HCO3=${hcP}% SO4=${soP}% Cl=${clP}% → ${zone} | ${type}<br>————<br>`;
        document.querySelector('#resultTable tbody').innerHTML += `<tr><td>${NO}</td><td>${caP}</td><td>${mgP}</td><td>${nkP}</td><td>${hcP}</td><td>${soP}</td><td>${clP}</td><td>${zone}</td><td>${type}</td></tr>`;
    }
    refreshPlot();
}

// 添加数据点
function addPoint(x,y,text,color,sym){
    dataPoints.push({
        type:'scatter',x:[x],y:[y],mode:'markers+text',text:text,textposition:'top right',
        marker:{color,size:7,symbol:sym},textfont:{size:9},showlegend:false
    });
}

// 导出
function exportImage(){Plotly.downloadImage('plotArea',{format:'png',width:1600,height:900,filename:'Piper三线图'});}
function exportExcel(){XLSX.writeFile(XLSX.utils.book_new(XLSX.utils.json_to_sheet(allPoints)),"地下水分析结果.xlsx");}
function goHome(){window.location.href="https://wordtrainer.github.io/";}
</script>
</body>
</html>
