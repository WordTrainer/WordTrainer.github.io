<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地下水Piper三线图分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.30.1/dist/plotly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        #plotArea { height: 700px; background: white; border-radius: 8px; padding: 10px; }
        .result-box { height: 200px; overflow-y: auto; background: white; }
        .table-container { max-height: 300px; overflow-y: auto; }
        .loading { color: #0d6efd; font-weight: 500; margin-left: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h3 class="text-center mb-4 text-primary">地下水Piper三线图化学分类分析</h3>
        
        <div class="row mb-3">
            <div class="col-auto">
                <button class="btn btn-primary" onclick="selectExcel()">导入Excel数据</button>
                <span class="loading" id="loadingTip">正在解析数据...</span>
                <button class="btn btn-success" onclick="showDivisions()">显示六区划分</button>
                <button class="btn btn-warning" onclick="hideDivisions()">隐藏划分</button>
                <button class="btn btn-info" onclick="exportImage()">导出图片</button>
                <button class="btn btn-dark" onclick="exportExcel()">导出结果Excel</button>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div id="plotArea"></div>
            </div>
            <div class="col-lg-4">
                <div class="card mb-3">
                    <div class="card-header">分析结果</div>
                    <div class="card-body result-box" id="resultText"></div>
                </div>
                <div class="card table-container">
                    <div class="card-header">数据表格</div>
                    <table class="table table-sm" id="resultTable">
                        <thead>
                            <tr>
                                <th>序号</th><th>Ca%</th><th>Mg%</th><th>Na+K%</th><th>HCO3+CO3%</th><th>SO4%</th><th>Cl%</th><th>区域</th><th>水化学类型</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
// 常量定义（离子当量质量：摩尔质量/电价）
const EQUIVALENT_MASS = {
    Ca2+: 20.04,   // Ca²+：40.08/2
    Mg2+: 12.155,  // Mg²+：24.31/2
    K+: 39.1,      // K+：39.1/1
    Na+: 22.99,    // Na+：22.99/1
    HCO3-: 61.02,  // HCO3⁻：61.02/1
    CO32-: 30.005, // CO3²⁻：60.01/2
    SO42-: 48.03,  // SO4²⁻：96.06/2
    Cl-: 35.45     // Cl⁻：35.45/1
};

// 全局变量
let plotData = [];       // 绘图数据
let layout = {};         // 布局配置
let config = {responsive: true}; // 响应式配置
let allPoints = [];      // 所有数据点
let showDivisionFlag = false; // 是否显示六区划分
const sqrt3 = Math.sqrt(3)/2; // 等边三角形高系数

// ===================== 初始化绘图 =====================
window.onload = function() {
    initPiperPlot();
};

/**
 * 初始化Piper三线图基础结构
 */
function initPiperPlot() {
    // 清空绘图数据
    plotData = [];
    
    // 布局配置（适配Piper图坐标范围）
    layout = {
        title: { text: '地下水Piper三线图分析', font: { size: 18, color: '#2c3e50' }},
        showlegend: false,
        xaxis: { 
            range: [-0.1, 3.0], 
            showgrid: false, 
            zeroline: false, 
            tickmode: 'array',
            tickvals: [],
            ticktext: [],
            title: { text: '', font: { size: 12 }}
        },
        yaxis: { 
            range: [-0.1, 2.0], 
            showgrid: false, 
            zeroline: false,
            tickmode: 'array',
            tickvals: [],
            ticktext: [],
            title: { text: '', font: { size: 12 }}
        },
        plot_bgcolor: '#ffffff',
        paper_bgcolor: '#f8f9fa',
        margin: { l: 20, r: 20, t: 40, b: 20 }
    };

    // 绘制基础三线图结构
    drawCationTriangle();   // 左侧阳离子三角
    drawAnionTriangle();    // 右侧阴离子三角
    drawDiamondArea();      // 中间钻石区
    drawAxisLabels();       // 绘制轴标签
    
    // 初始化绘图
    Plotly.newPlot('plotArea', plotData, layout, config).then(() => {
        console.log('Piper图基础结构初始化完成');
    }).catch(err => {
        alert('绘图初始化失败：' + err.message);
    });
}

/**
 * 绘制左侧阳离子三角形（Ca-Mg-Na+K）
 */
function drawCationTriangle() {
    // 阳离子三角顶点坐标（等边三角形，边长1）
    const cationVertices = [
        [0.0, 0.0],    // Na+K 顶点
        [1.0, 0.0],    // Mg 顶点
        [0.5, sqrt3]   // Ca 顶点
    ];
    
    // 绘制三角形边框
    addLine([...cationVertices, cationVertices[0]], '#2c3e50', 2);
    
    // 绘制百分比网格线（0-100%）
    drawTriangleGrid(cationVertices, '#e8f4f8', 0.1);
    
    // 标注顶点文字
    addTextAnnotation(0.0, -0.08, 'Na+K', 12, 'middle center');
    addTextAnnotation(1.0, -0.08, 'Mg', 12, 'middle center');
    addTextAnnotation(0.5, sqrt3 + 0.08, 'Ca', 12, 'middle center');
}

/**
 * 绘制右侧阴离子三角形（HCO3+CO3-SO4-Cl）
 */
function drawAnionTriangle() {
    // 阴离子三角顶点坐标（偏移1.5，与阳离子三角对齐）
    const anionVertices = [
        [1.5, 0.0],    // Cl 顶点
        [2.5, 0.0],    // SO4 顶点
        [2.0, sqrt3]   // HCO3+CO3 顶点
    ];
    
    // 绘制三角形边框
    addLine([...anionVertices, anionVertices[0]], '#e74c3c', 2);
    
    // 绘制百分比网格线（0-100%）
    drawTriangleGrid(anionVertices, '#fef2f2', 0.1);
    
    // 标注顶点文字
    addTextAnnotation(1.5, -0.08, 'Cl', 12, 'middle center');
    addTextAnnotation(2.5, -0.08, 'SO4', 12, 'middle center');
    addTextAnnotation(2.0, sqrt3 + 0.08, 'HCO3+CO3', 12, 'middle center');
}

/**
 * 绘制中间钻石区（Piper核心区）
 */
function drawDiamondArea() {
    // 钻石区顶点（连接阴阳离子三角的中点）
    const diamondVertices = [
        [1.0, sqrt3],  // 阳离子三角顶点延伸
        [1.5, sqrt3 + sqrt3/2], // 上顶点
        [2.0, sqrt3],  // 阴离子三角顶点延伸
        [1.5, sqrt3/2], // 下顶点
        [1.0, sqrt3]   // 闭合
    ];
    
    // 绘制钻石区边框
    addLine(diamondVertices, '#27ae60', 2);
    
    // 绘制钻石区内部网格
    for(let i=1; i<10; i++) {
        const ratio = i/10;
        // 水平网格
        const y1 = sqrt3/2 + ratio * sqrt3/2;
        addLine([[1.0 + ratio*0.5, y1], [2.0 - ratio*0.5, y1]], '#e6f5e9', 0.5);
        // 垂直网格
        const x1 = 1.5 - ratio*0.5;
        const x2 = 1.5 + ratio*0.5;
        addLine([[x1, sqrt3/2 + (1-ratio)*sqrt3/2], [x2, sqrt3/2 + ratio*sqrt3/2]], '#e6f5e9', 0.5);
    }
}

/**
 * 绘制轴标签
 */
function drawAxisLabels() {
    // 阳离子三角标签
    addTextAnnotation(0.5, -0.2, '阳离子三角图（当量%）', 14, 'middle center', '#2c3e50');
    // 阴离子三角标签
    addTextAnnotation(2.0, -0.2, '阴离子三角图（当量%）', 14, 'middle center', '#e74c3c');
    // 钻石区标签
    addTextAnnotation(1.5, 1.8, '水化学类型钻石区', 14, 'middle center', '#27ae60');
}

/**
 * 绘制三角形内部网格
 * @param {Array} vertices 三角形顶点
 * @param {String} color 网格颜色
 * @param {Number} step 步长（0-1）
 */
function drawTriangleGrid(vertices, color, step) {
    for(let r=step; r<1; r+=step) {
        // 绘制平行于底边的线
        const p1 = lerp(vertices[0], vertices[1], r);
        const p2 = lerp(vertices[0], vertices[2], r);
        const p3 = lerp(vertices[1], vertices[2], r);
        addLine([p1, p2], color, 0.5);
        addLine([p2, p3], color, 0.5);
    }
}

/**
 * 添加线条到绘图数据
 * @param {Array} points 坐标点数组 [[x1,y1],[x2,y2],...]
 * @param {String} color 颜色
 * @param {Number} width 线宽
 */
function addLine(points, color, width) {
    const x = points.map(p => p[0]);
    const y = points.map(p => p[1]);
    plotData.push({
        type: 'scatter',
        x: x,
        y: y,
        mode: 'lines',
        line: { color: color, width: width },
        hoverinfo: 'skip'
    });
}

/**
 * 添加文字标注
 * @param {Number} x X坐标
 * @param {Number} y Y坐标
 * @param {String} text 文字内容
 * @param {Number} size 字体大小
 * @param {String} align 对齐方式
 * @param {String} color 文字颜色
 */
function addTextAnnotation(x, y, text, size=12, align='middle center', color='#333') {
    plotData.push({
        type: 'scatter',
        x: [x],
        y: [y],
        text: [text],
        mode: 'text',
        textfont: { size: size, color: color },
        textposition: align,
        hoverinfo: 'skip'
    });
}

/**
 * 线性插值计算
 * @param {Array} a 起点 [x,y]
 * @param {Array} b 终点 [x,y]
 * @param {Number} t 插值比例（0-1）
 * @returns {Array} 插值点坐标
 */
function lerp(a, b, t) {
    return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
}

// ===================== 六区划分 =====================
function showDivisions() {
    if(showDivisionFlag) return;
    showDivisionFlag = true;

    // 六区划分坐标（基于钻石区）
    const zones = [
        {
            pts: [[1.0, sqrt3], [1.25, 1.5*sqrt3], [1.5, 1.732], [1.25, sqrt3], [1.0, sqrt3]],
            color: 'rgba(255, 228, 225, 0.5)',
            text: '1区:碳酸盐钙型'
        },
        {
            pts: [[1.5, 1.732], [1.75, 1.5*sqrt3], [2.0, sqrt3], [1.75, sqrt3], [1.5, 1.732]],
            color: 'rgba(224, 247, 250, 0.5)',
            text: '2区:碳酸盐钠型'
        },
        {
            pts: [[1.25, 1.5*sqrt3], [1.5, 1.732], [1.75, 1.5*sqrt3], [1.5, sqrt3], [1.25, 1.5*sqrt3]],
            color: 'rgba(241, 248, 233, 0.5)',
            text: '3区:碳酸盐型'
        },
        {
            pts: [[1.0, sqrt3], [1.25, sqrt3], [1.5, sqrt3/2], [1.25, 1.5*sqrt3], [1.0, sqrt3]],
            color: 'rgba(252, 248, 227, 0.5)',
            text: '4区:硫酸盐钙型'
        },
        {
            pts: [[1.5, sqrt3/2], [1.75, sqrt3], [2.0, sqrt3], [1.75, 1.5*sqrt3], [1.5, sqrt3/2]],
            color: 'rgba(230, 225, 249, 0.5)',
            text: '5区:氯化物钠型'
        },
        {
            pts: [[1.25, sqrt3], [1.5, sqrt3/2], [1.75, sqrt3], [1.5, sqrt3], [1.25, sqrt3]],
            color: 'rgba(255, 235, 238, 0.5)',
            text: '6区:混合类型'
        }
    ];

    // 添加六区到绘图
    zones.forEach(z => {
        // 绘制区域填充
        plotData.push({
            type: 'scatter',
            x: z.pts.map(p => p[0]),
            y: z.pts.map(p => p[1]),
            mode: 'lines',
            line: { color: '#7f8c8d', width: 1 },
            fill: 'toself',
            fillcolor: z.color,
            hoverinfo: 'skip'
        });
        // 标注区域文字
        const centerX = z.pts.reduce((sum, p) => sum + p[0], 0) / z.pts.length;
        const centerY = z.pts.reduce((sum, p) => sum + p[1], 0) / z.pts.length;
        addTextAnnotation(centerX, centerY, z.text, 9, 'middle center', '#2c3e50');
    });

    Plotly.update('plotArea', plotData, layout).catch(err => {
        console.error('更新六区划分失败：', err);
    });
}

function hideDivisions() {
    initPiperPlot();
    showDivisionFlag = false;
    if(allPoints.length > 0) {
        setTimeout(() => {
            renderAllPoints();
        }, 500); // 延迟确保绘图初始化完成
    }
}

// ===================== Excel导入（核心修复） =====================
function selectExcel() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls,.csv'; // 兼容更多格式
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        // 显示加载提示
        const loadingTip = document.getElementById('loadingTip');
        loadingTip.style.display = 'inline';

        try {
            // 读取文件（兼容二进制/文本格式）
            const data = await readFileAsync(file);
            // 解析Excel
            const wb = XLSX.read(data, { type: file.type.includes('csv') ? 'text' : 'array' });
            const sheetName = wb.SheetNames[0];
            const sheet = wb.Sheets[sheetName];
            // 转换为数组（强制表头为字符串，避免格式问题）
            const excelData = XLSX.utils.sheet_to_json(sheet, { 
                header: 1, 
                raw: false, // 禁用原始值，统一转为字符串后再解析
                defval: ''  // 空值填充为空字符串
            });

            console.log('Excel解析结果：', excelData);
            // 处理数据
            processExcelData(excelData);

            // 隐藏加载提示
            loadingTip.style.display = 'none';
            alert(`数据导入成功！共解析 ${allPoints.length} 个有效数据点`);
        } catch (err) {
            // 隐藏加载提示
            loadingTip.style.display = 'none';
            console.error('Excel导入失败：', err);
            alert('数据导入失败：' + err.message + '\n请检查文件格式（支持.xlsx/.xls/.csv）和数据内容');
        }
    };
    input.click();
}

/**
 * 异步读取文件（兼容所有浏览器）
 * @param {File} file 文件对象
 * @returns {Promise} 文件内容
 */
function readFileAsync(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        if(file.type.includes('csv') || file.name.endsWith('.csv')) {
            reader.readAsText(file, 'UTF-8');
        } else {
            reader.readAsArrayBuffer(file);
        }
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('文件读取失败，请检查文件是否损坏'));
    });
}

/**
 * 处理Excel数据（增强容错性）
 * @param {Array} data Excel数据（二维数组）
 */
function processExcelData(data) {
    allPoints = [];
    // 清空结果区域
    document.getElementById('resultText').innerHTML = '';
    document.getElementById('tableBody').innerHTML = '';

    // 步骤1：解析表头（兼容各种写法）
    if(data.length < 1) {
        throw new Error('Excel文件为空');
    }
    const header = data[0].map(h => h ? h.toString().trim().replace(/²|³|⁺|⁻/g, '') : ''); // 移除特殊符号统一匹配
    console.log('处理后的表头：', header);

    // 表头映射（模糊匹配）
    const headerIndex = {
        序号: -1,
        Ca2: -1, // 匹配Ca²+、Ca2+
        Mg2: -1,
        K: -1,
        Na: -1,
        HCO3: -1,
        CO32: -1,
        SO42: -1,
        Cl: -1
    };

    // 模糊匹配表头
    header.forEach((h, idx) => {
        if(!h) return;
        for(const key of Object.keys(headerIndex)) {
            if(h.includes(key) || key.includes(h)) {
                headerIndex[key] = idx;
                break;
            }
        }
    });

    // 校验必填列
    const missingCols = [];
    if(headerIndex.序号 === -1) missingCols.push('序号');
    if(headerIndex.Ca2 === -1) missingCols.push('Ca²+');
    if(headerIndex.Mg2 === -1) missingCols.push('Mg²+');
    if(headerIndex.K === -1) missingCols.push('K+');
    if(headerIndex.Na === -1) missingCols.push('Na+');
    if(headerIndex.HCO3 === -1) missingCols.push('HCO3⁻');
    if(headerIndex.CO32 === -1) missingCols.push('CO3²⁻');
    if(headerIndex.SO42 === -1) missingCols.push('SO4²⁻');
    if(headerIndex.Cl === -1) missingCols.push('Cl⁻');

    if(missingCols.length > 0) {
        throw new Error(`缺少必要列：${missingCols.join('、')}`);
    }

    // 步骤2：处理数据行
    let validCount = 0;
    for(let i=1; i<data.length; i++) {
        const row = data[i];
        // 跳过空行（所有列都为空）
        if(!row || row.every(cell => cell === '' || cell === null || cell === undefined)) {
            continue;
        }

        try {
            // 提取数据（兼容不同列索引，空值转0）
            const NO = row[headerIndex.序号] || i;
            const caContent = parseFloat(row[headerIndex.Ca2]) || 0;
            const mgContent = parseFloat(row[headerIndex.Mg2]) || 0;
            const kContent = parseFloat(row[headerIndex.K]) || 0;
            const naContent = parseFloat(row[headerIndex.Na]) || 0;
            const hco3Content = parseFloat(row[headerIndex.HCO3]) || 0;
            const co3Content = parseFloat(row[headerIndex.CO32]) || 0;
            const so4Content = parseFloat(row[headerIndex.SO42]) || 0;
            const clContent = parseFloat(row[headerIndex.Cl]) || 0;

            // 跳过全0行
            if(caContent + mgContent + kContent + naContent + hco3Content + co3Content + so4Content + clContent === 0) {
                console.log(`第${i+1}行数据全为0，跳过`);
                continue;
            }

            // 计算当量浓度
            const caEq = caContent / EQUIVALENT_MASS.Ca2+;
            const mgEq = mgContent / EQUIVALENT_MASS.Mg2+;
            const kEq = kContent / EQUIVALENT_MASS.K+;
            const naEq = naContent / EQUIVALENT_MASS.Na+;
            const hco3Eq = hco3Content / EQUIVALENT_MASS.HCO3-;
            const co3Eq = co3Content / EQUIVALENT_MASS.CO32-;
            const so4Eq = so4Content / EQUIVALENT_MASS.SO42-;
            const clEq = clContent / EQUIVALENT_MASS.Cl-;

            // 计算总当量
            const catTotalEq = caEq + mgEq + kEq + naEq;
            const aniTotalEq = hco3Eq + co3Eq + so4Eq + clEq;

            // 避免除以0（最小阈值）
            if(catTotalEq < 0.00001 || aniTotalEq < 0.00001) {
                console.log(`第${i+1}行总当量过小，跳过`);
                continue;
            }

            // 计算百分比
            const caPer = (caEq / catTotalEq * 100).toFixed(1);
            const mgPer = (mgEq / catTotalEq * 100).toFixed(1);
            const nakPer = ((kEq + naEq) / catTotalEq * 100).toFixed(1);
            const hcPer = ((hco3Eq + co3Eq) / aniTotalEq * 100).toFixed(1);
            const soPer = (so4Eq / aniTotalEq * 100).toFixed(1);
            const clPer = (clEq / aniTotalEq * 100).toFixed(1);

            // 计算Piper坐标
            const cationX = parseFloat(nakPer) / 100;
            const cationY = parseFloat(caPer) / 100 * sqrt3;
            const anionX = 1.5 + parseFloat(clPer) / 100;
            const anionY = parseFloat(hcPer) / 100 * sqrt3;
            const diamondX = 1.0 + (cationX * 0.5) + ((anionX - 1.5) * 0.5);
            const diamondY = sqrt3/2 + (cationY * 0.5) + (anionY * 0.5);

            // 判定区域和类型
            const zone = getZone(diamondX, diamondY);
            const waterType = getWaterType(diamondX, diamondY);

            // 存储数据点
            allPoints.push({
                NO,
                caPer, mgPer, nakPer,
                hcPer, soPer, clPer,
                cationX, cationY,
                anionX, anionY,
                diamondX, diamondY,
                zone,
                type: waterType,
                rawData: {
                    ca: caContent, mg: mgContent, k: kContent, na: naContent,
                    hco3: hco3Content, co3: co3Content, so4: so4Content, cl: clContent
                }
            });
            validCount++;

            // 添加结果文本
            addResultText(allPoints[allPoints.length-1]);
        } catch (rowErr) {
            console.error(`处理第${i+1}行失败：`, rowErr);
            continue; // 跳过错误行，继续处理其他行
        }
    }

    if(validCount === 0) {
        throw new Error('未解析到有效数据，请检查数据格式（数值应为数字）');
    }

    // 渲染数据点（延迟确保绘图容器就绪）
    setTimeout(() => {
        renderAllPoints();
        renderTable();
    }, 300);
}

// ===================== 数据点渲染（增强稳定性） =====================
function renderAllPoints() {
    // 清空原有数据点（保留基础图形）
    const basePlotData = plotData.filter(item => 
        item.mode === 'lines' || item.mode === 'text' // 只保留线条和文字标注
    );
    plotData = basePlotData;

    // 阳离子三角数据点
    const cationX = allPoints.map(p => p.cationX);
    const cationY = allPoints.map(p => p.cationY);
    const cationText = allPoints.map(p => p.NO);
    
    plotData.push({
        type: 'scatter',
        x: cationX,
        y: cationY,
        mode: 'markers+text',
        text: cationText,
        textposition: 'top right',
        marker: { color: '#3498db', size: 8, symbol: 'circle', line: { width: 1, color: '#fff' } },
        textfont: { size: 10, color: '#2c3e50' },
        hoverinfo: 'text',
        hovertext: allPoints.map(p => 
            `数据点${p.NO}<br>
            原始含量(mg/L)：Ca=${p.rawData.ca} | Mg=${p.rawData.mg} | K=${p.rawData.k} | Na=${p.rawData.na}<br>
            当量百分比：Ca=${p.caPer}% | Mg=${p.mgPer}% | Na+K=${p.nakPer}%`
        )
    });

    // 阴离子三角数据点
    const anionX = allPoints.map(p => p.anionX);
    const anionY = allPoints.map(p => p.anionY);
    
    plotData.push({
        type: 'scatter',
        x: anionX,
        y: anionY,
        mode: 'markers+text',
        text: cationText,
        textposition: 'top right',
        marker: { color: '#e74c3c', size: 8, symbol: 'circle', line: { width: 1, color: '#fff' } },
        textfont: { size: 10, color: '#2c3e50' },
        hoverinfo: 'text',
        hovertext: allPoints.map(p => 
            `数据点${p.NO}<br>
            原始含量(mg/L)：HCO3=${p.rawData.hco3} | CO3=${p.rawData.co3} | SO4=${p.rawData.so4} | Cl=${p.rawData.cl}<br>
            当量百分比：HCO3+CO3=${p.hcPer}% | SO4=${p.soPer}% | Cl=${p.clPer}%`
        )
    });

    // 钻石区数据点（核心）
    const diamondX = allPoints.map(p => p.diamondX);
    const diamondY = allPoints.map(p => p.diamondY);
    
    plotData.push({
        type: 'scatter',
        x: diamondX,
        y: diamondY,
        mode: 'markers+text',
        text: cationText,
        textposition: 'top right',
        marker: { color: '#f39c12', size: 10, symbol: 'circle', line: { width: 2, color: '#fff' } },
        textfont: { size: 11, color: '#e67e22' },
        hoverinfo: 'text',
        hovertext: allPoints.map(p => 
            `数据点${p.NO}<br>
            水化学类型:${p.type}<br>
            所属区域:${p.zone}区<br>
            阳离子当量%：Ca=${p.caPer}% | Mg=${p.mgPer}% | Na+K=${p.nakPer}%<br>
            阴离子当量%：HCO3+CO3=${p.hcPer}% | SO4=${p.soPer}% | Cl=${p.clPer}%`
        )
    });

    // 更新绘图（强制重绘）
    Plotly.react('plotArea', plotData, layout, config).catch(err => {
        console.error('渲染数据点失败：', err);
        alert('绘图更新失败，请刷新页面重试');
    });
}

// ===================== 辅助函数 =====================
function getZone(x, y) {
    if(x < 1.25 && y > 1.0) return "1、3、6";
    if(x < 1.25 && y <= 1.0) return "1、4、5";
    if(x >= 1.25 && x <= 1.75 && y > 1.0) return "2、3、6";
    if(x > 1.75 && y > 1.0) return "2、3、7";
    if(x >= 1.25 && x <= 1.75 && y <= 1.0) return "2、4、6";
    if(x > 1.75 && y <= 1.0) return "2、4、8";
    return "9";
}

function getWaterType(x, y) {
    if(y > 1.2) return "碳酸盐型水";
    if(x < 1.25 && y <= 1.2) return "钙镁型水";
    if(x > 1.75 && y <= 1.2) return "钠-氯化物型水";
    return "硫酸盐-氯化物型水";
}

function addResultText(point) {
    const resultDiv = document.getElementById('resultText');
    resultDiv.innerHTML += `
        [数据点 ${point.NO}] Ca=${point.caPer}% | Mg=${point.mgPer}% | Na+K=${point.nakPer}% | 
        HCO3+CO3=${point.hcPer}% | SO4=${point.soPer}% | Cl=${point.clPer}%<br>
        → 区域：${point.zone} 区 | 类型：${point.type}<br>
        ————————————————<br>
    `;
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    allPoints.forEach(point => {
        tbody.innerHTML += `
            <tr>
                <td>${point.NO}</td>
                <td>${point.caPer}</td>
                <td>${point.mgPer}</td>
                <td>${point.nakPer}</td>
                <td>${point.hcPer}</td>
                <td>${point.soPer}</td>
                <td>${point.clPer}</td>
                <td>${point.zone}</td>
                <td>${point.type}</td>
            </tr>
        `;
    });
}

// ===================== 导出功能 =====================
function exportImage() {
    Plotly.downloadImage('plotArea', {
        format: 'png',
        width: 1200,
        height: 800,
        filename: '地下水Piper三线图_' + new Date().toLocaleDateString().replace(/\//g, '-')
    }).catch(err => {
        alert('导出图片失败：' + err.message);
    });
}

function exportExcel() {
    if(allPoints.length === 0) {
        alert('暂无数据可导出！');
        return;
    }

    const exportData = allPoints.map(p => ({
        '序号': p.NO,
        'Ca²+含量(mg/L)': p.rawData.ca,
        'Mg²+含量(mg/L)': p.rawData.mg,
        'K+含量(mg/L)': p.rawData.k,
        'Na+含量(mg/L)': p.rawData.na,
        'HCO3⁻含量(mg/L)': p.rawData.hco3,
        'CO3²⁻含量(mg/L)': p.rawData.co3,
        'SO4²⁻含量(mg/L)': p.rawData.so4,
        'Cl⁻含量(mg/L)': p.rawData.cl,
        'Ca当量%': p.caPer + '%',
        'Mg当量%': p.mgPer + '%',
        'Na+K当量%': p.nakPer + '%',
        'HCO3+CO3当量%': p.hcPer + '%',
        'SO4当量%': p.soPer + '%',
        'Cl当量%': p.clPer + '%',
        '所属区域': p.zone + '区',
        '水化学类型': p.type
    }));

    try {
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Piper分析结果');
        XLSX.writeFile(wb, '地下水Piper三线图分析结果.xlsx');
    } catch (err) {
        alert('导出Excel失败：' + err.message);
    }
}
