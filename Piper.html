<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地下水Piper三线图分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.30.1/dist/plotly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        #plotArea { height: 700px; background: white; border-radius: 8px; padding: 10px; }
        .result-box { height: 200px; overflow-y: auto; background: white; }
        .table-container { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h3 class="text-center mb-4 text-primary">地下水Piper三线图化学分类分析</h3>
        
        <div class="row mb-3">
            <div class="col-auto">
                <button class="btn btn-primary" onclick="selectExcel()">导入Excel数据</button>
                <button class="btn btn-success" onclick="showDivisions()">显示六区划分</button>
                <button class="btn btn-warning" onclick="hideDivisions()">隐藏划分</button>
                <button class="btn btn-info" onclick="exportImage()">导出图片</button>
                <button class="btn btn-dark" onclick="exportExcel()">导出结果Excel</button>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div id="plotArea"></div>
            </div>
            <div class="col-lg-4">
                <div class="card mb-3">
                    <div class="card-header">分析结果</div>
                    <div class="card-body result-box" id="resultText"></div>
                </div>
                <div class="card table-container">
                    <div class="card-header">数据表格</div>
                    <table class="table table-sm" id="resultTable">
                        <thead>
                            <tr>
                                <th>序号</th><th>Ca%</th><th>Mg%</th><th>Na+K%</th><th>HCO3+CO3%</th><th>SO4%</th><th>Cl%</th><th>区域</th><th>水化学类型</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
// 常量定义（离子摩尔质量）
const CONST = {
    Ca: 40.08, Mg: 24.31, K: 39.1, Na: 22.99,
    HCO3: 61.02, CO3: 60.01, SO4: 96.06, Cl: 35.45
};

// 全局变量
let plotData = [];
let layout = {};
let config = {responsive: true};
let allPoints = [];
let parallelogram = {};
let showDivisionFlag = false;

// ===================== 初始化绘图 =====================
window.onload = function() {
    initPiperPlot();
};

function initPiperPlot() {
    layout = {
        title: { text: '地下水Piper三线图分析', font: { size: 16 }},
        showlegend: false,
        xaxis: { range: [-0.2, 2.4], showgrid: true, zeroline: false, title: 'X轴' },
        yaxis: { range: [-0.2, 2.0], showgrid: true, zeroline: false, title: 'Y轴' },
        plot_bgcolor: 'aliceblue',
        paper_bgcolor: 'white'
    };
    plotData = [];
    drawBaseTriangles();
    Plotly.newPlot('plotArea', plotData, layout, config);
}

// ===================== 绘制基础三角形与平行四边形 =====================
function drawBaseTriangles() {
    const sqrt3 = Math.sqrt(3)/2;
    // 阳离子三角形
    const cation = [[0,0], [1,0], [0.5, sqrt3], [0,0]];
    addLine(cation, '#336699', 2.5);
    
    // 阴离子三角形
    const anion = [[1.2,0], [2.2,0], [1.7, sqrt3], [1.2,0]];
    addLine(anion, '#cc6666', 2.5);

    // 网格线
    drawGrid([[0,0],[1,0],[0.5,sqrt3]], '#e1f0ff');
    drawGrid([[1.2,0],[2.2,0],[1.7,sqrt3]], '#ffe5e5');

    // 计算平行四边形
    calcParallelogram(sqrt3);
    // 绘制平行四边形
    const para = [
        [parallelogram.bottom.x, parallelogram.bottom.y],
        [parallelogram.left.x, parallelogram.left.y],
        [parallelogram.top.x, parallelogram.top.y],
        [parallelogram.right.x, parallelogram.right.y],
        [parallelogram.bottom.x, parallelogram.bottom.y]
    ];
    addLine(para, '#99cc99', 2);
    drawParaGrid();
}

// 计算平行四边形顶点
function calcParallelogram(sqrt3) {
    parallelogram.top = {x: 1.1, y: sqrt3 + 0.2};
    parallelogram.left = {x: 0.6, y: sqrt3 + 0.6};
    parallelogram.right = {x: 1.6, y: sqrt3 + 0.6};
    parallelogram.bottom = {x: 1.1, y: sqrt3 + 1.0};
}

// 绘制线条
function addLine(points, color, width) {
    let x = [], y = [];
    points.forEach(p => { x.push(p[0]); y.push(p[1]); });
    plotData.push({
        type: 'scatter', x, y, mode: 'lines',
        line: { color, width },
        hoverinfo: 'skip'
    });
}

// 绘制网格
function drawGrid(tri, color) {
    for(let i=1; i<10; i++) {
        let r = i/10;
        let p1 = lerp(tri[0], tri[1], r);
        let p2 = lerp(tri[0], tri[2], r);
        let p3 = lerp(tri[1], tri[2], r);
        addLine([p1, p2], color, 0.5);
        addLine([p2, p3], color, 0.5);
    }
}

function drawParaGrid() {
    const p = parallelogram;
    for(let i=1; i<10; i++) {
        let r1 = i/10, r2 = 1-i/10;
        let a = lerp([p.bottom.x,p.bottom.y], [p.left.x,p.left.y], r1);
        let b = lerp([p.top.x,p.top.y], [p.right.x,p.right.y], r2);
        let c = lerp([p.left.x,p.left.y], [p.top.x,p.top.y], r1);
        let d = lerp([p.right.x,p.right.y], [p.bottom.x,p.bottom.y], r2);
        addLine([a,b], '#eee', 0.5);
        addLine([c,d], '#eee', 0.5);
    }
}

function lerp(a,b,t) {
    return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
}

// ===================== 六区划分 =====================
function showDivisions() {
    if(showDivisionFlag) return;
    showDivisionFlag = true;
    const p = parallelogram;
    const zones = [
        {pts: [[0.85,1.066],[1.1,0.866],[1.35,1.066],[0.85,1.066]], color: 'rgba(255,204,204,0.5)', text:'6区:非碳酸硬度>50%'},
        {pts: [[1.1,1.066],[0.85,1.066],[1.1,0.866],[1.1,1.066]], color: 'rgba(204,204,255,0.5)', text:'9区:无离子>50%'},
        {pts: [[0.85,1.266],[0.6,1.066],[0.85,1.066],[1.1,1.266],[0.85,1.266]], color:'rgba(204,255,204,0.5)', text:'5区:碳酸硬度>50%'},
        {pts: [[1.1,1.066],[1.35,1.066],[1.6,1.066],[1.35,1.266],[1.1,1.066]], color:'rgba(255,255,204,0.5)', text:'7区:非碳酸碱金属>50%'},
        {pts: [[1.35,1.266],[1.1,1.266],[1.1,1.066],[1.35,1.266]], color:'rgba(204,204,255,0.5)', text:'9区:无离子>50%'},
        {pts: [[0.85,1.266],[1.35,1.266],[1.1,1.466],[0.85,1.266]], color:'rgba(255,204,255,0.5)', text:'8区:碳酸碱金属>50%'}
    ];

    zones.forEach(z => {
        let x = [], y = [];
        z.pts.forEach(p => {x.push(p[0]); y.push(p[1]);});
        plotData.push({type:'scatter',x,y,mode:'lines',line:{color:'black',width:1},fill:'toself',fillcolor:z.color,hoverinfo:'skip'});
        plotData.push({
            type:'scatter',x:[z.pts[2][0]],y:[z.pts[2][1]],text:[z.text],mode:'text',textfont:{size:8},hoverinfo:'skip'
        });
    });
    Plotly.update('plotArea', plotData, layout);
}

function hideDivisions() {
    initPiperPlot();
    showDivisionFlag = false;
    if(allPoints.length > 0) renderAllPoints();
}

// ===================== Excel导入 =====================
function selectExcel() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            const wb = XLSX.read(ev.target.result);
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const data = XLSX.utils.sheet_to_json(sheet, {header:1});
            processExcelData(data);
        };
        reader.readAsArrayBuffer(file);
    };
    input.click();
}

function processExcelData(data) {
    allPoints = [];
    document.getElementById('resultText').innerHTML = '';
    document.querySelector('#resultTable tbody').innerHTML = '';
    
    for(let i=1; i<data.length; i++) {
        const row = data[i];
        if(!row || row.length <9) continue;
        const NO = row[0] || i;
        const ca = row[1]||0, mg=row[2]||0, k=row[3]||0, na=row[4]||0;
        const hco3=row[5]||0, co3=row[6]||0, so4=row[7]||0, cl=row[8]||0;

        // 当量计算
        const caEq = ca/(CONST.Ca/2), mgEq=mg/(CONST.Mg/2);
        const kEq=k/CONST.K, naEq=na/CONST.Na;
        const catTotal = caEq+mgEq+kEq+naEq;
        
        const hco3Eq = hco3/CONST.HCO3, co3Eq=co3/(CONST.CO3/2);
        const so4Eq=so4/(CONST.SO4/2), clEq=cl/CONST.Cl;
        const aniTotal = hco3Eq+co3Eq+so4Eq+clEq;

        // 百分比
        const caPer = (caEq/catTotal*100).toFixed(1);
        const mgPer = (mgEq/catTotal*100).toFixed(1);
        const nakPer = ((kEq+naEq)/catTotal*100).toFixed(1);
        const hcPer = ((hco3Eq+co3Eq)/aniTotal*100).toFixed(1);
        const soPer = (so4Eq/aniTotal*100).toFixed(1);
        const clPer = (clEq/aniTotal*100).toFixed(1);

        // 点位
        const diaX = 0.7 + Number(nakPer)/100*0.8;
        const diaY = 1.0 + Number(hcPer)/100*0.4;
        const zone = getZone(diaX, diaY);
        const type = getWaterType(diaX, diaY);

        allPoints.push({NO, x:diaX, y:diaY, caPer,mgPer,nakPer,hcPer,soPer,clPer,zone,type});
        addResultText(NO, caPer,mgPer,nakPer,hcPer,soPer,clPer,zone,type);
    }
    renderAllPoints();
    renderTable();
}

// ===================== 点位渲染 =====================
function renderAllPoints() {
    let x = [], y = [], text = [];
    allPoints.forEach(p => {
        x.push(p.x); y.push(p.y); text.push(p.NO);
    });
    plotData.push({
        type:'scatter', x,y, mode:'markers+text',text,textposition:'top right',
        marker:{color:'orange', size:6, symbol:'circle'},
        textfont:{size:10}, hoverinfo:'text'
    });
    Plotly.update('plotArea', plotData, layout);
}

// ===================== 辅助函数 =====================
function getZone(x,y) {
    if(x<1.1 && y>1.066) return "1、3、6";
    if(x<1.1 && y<1.066) return "1、4、5";
    if(x>1.1 && y>1.066) return "2、3、7";
    if(x>1.1 && y<1.066) return "2、4、8";
    return "9";
}

function getWaterType(x,y) {
    if(x<1.1&&y>1.066) return "碳酸盐型水";
    if(x>1.1&&y>1.066) return "硫酸盐-氯化物型水";
    if(x<1.1&&y<1.066) return "钙镁型水";
    return "钠-氯化物型水";
}

function addResultText(NO,ca,mg,nak,hc,so,cl,zone,type) {
    const div = document.getElementById('resultText');
    div.innerHTML += `[数据点 ${NO}] Ca=${ca}% | Mg=${mg}% | Na+K=${nak}% | HCO3+CO3=${hc}% | SO4=${so}% | Cl=${cl}%<br>`;
    div.innerHTML += `→ 区域：${zone} 区 | 类型：${type}<br>————————————————<br>`;
}

function renderTable() {
    const tb = document.querySelector('#resultTable tbody');
    allPoints.forEach(p => {
        tb.innerHTML += `<tr>
            <td>${p.NO}</td><td>${p.caPer}</td><td>${p.mgPer}</td><td>${p.nakPer}</td>
            <td>${p.hcPer}</td><td>${p.soPer}</td><td>${p.clPer}</td><td>${p.zone}</td><td>${p.type}</td>
        </tr>`;
    });
}

// ===================== 导出 =====================
function exportImage() {
    Plotly.downloadImage('plotArea', {format:'png', width:1200, height:800, filename:'Piper三线图'});
}

function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(allPoints);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "分析结果");
    XLSX.writeFile(wb, "地下水Piper分析结果.xlsx");
}
</script>
</body>
</html>
