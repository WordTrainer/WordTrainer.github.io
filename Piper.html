<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地下水 Piper 三线图分析系统</title>
    <script src="https://cdn.plot.ly/plotly-2.30.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        *{box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
        body{margin:20px;background:#f5f7fa}
        .container{display:flex;gap:20px;max-width:1600px;margin:0 auto}
        #plot{width:75%;height:820px;background:white;border-radius:8px;padding:10px}
        .panel{width:25%;display:flex;flex-direction:column;gap:12px}
        .box{background:white;padding:12px;border-radius:8px}
        .btn{padding:8px 12px;background:#4285f4;color:white;border:none;border-radius:4px;cursor:pointer;margin-bottom:6px;width:100%}
        .btn-success{background:#28a745}
        .btn-warning{background:#ffc107;color:#000}
        .btn-danger{background:#dc3545}
        #result{height:240px;overflow-y:auto;font-size:12px;line-height:1.4}
        #table{height:320px;overflow-y:auto;font-size:12px}
        table{width:100%;border-collapse:collapse}
        td,th{border:1px solid #ddd;padding:4px;text-align:center}
        th{background:#eee}
    </style>
</head>
<body>
<div class="container">
    <div id="plot"></div>
    <div class="panel">
        <div class="box">
            <button class="btn" onclick="importExcel()">导入 Excel 数据</button>
            <button class="btn btn-success" onclick="showZones()">显示 5/6/7/8/9 区</button>
            <button class="btn btn-warning" onclick="hideZones()">隐藏分区</button>
            <button class="btn" onclick="exportPic()">导出图片</button>
            <button class="btn btn-danger" onclick="exportResult()">导出结果 Excel</button>
        </div>
        <div class="box">
            <h4>分析结果</h4>
            <div id="result"></div>
        </div>
        <div class="box">
            <h4>数据表格</h4>
            <div id="table"></div>
        </div>
    </div>
</div>

<script>
const sqrt3 = Math.sqrt(3) / 2;
const CONST = {
    Ca:40.08, Mg:24.31, K:39.1, Na:22.99,
    HCO3:61.02, CO3:60.01, SO4:96.06, Cl:35.45
};

let plotDiv = document.getElementById('plot');
let base = [], data = [], zones = [];
let allResult = [];

window.onload = function(){
    drawBase();
    refresh();
};

function drawBase(){
    base = [];
    // 阳离子三角
    line([[0,0],[1,0],[0.5,sqrt3],[0,0]], '#336699', 2.5);
    // 阴离子三角
    line([[1.2,0],[2.2,0],[1.7,sqrt3],[1.2,0]], '#cc6666', 2.5);
    // 平行四边形（菱形）
    let p1 = {x:0.5, y:sqrt3}, p2={x:1.7, y:sqrt3};
    let p3={x:1.35, y:sqrt3+0.3}, p4={x:0.85, y:sqrt3+0.3};
    line([p1,p4,p3,p2,p1], '#99cc99', 2);

    // 网格
    for(let i=1;i<10;i++){
        let t = i/10;
        line([[t,0],[0.5, t*sqrt3]], '#cce5ff', 0.5);
        line([[1-t,0],[0.5+t*0.5, t*sqrt3]], '#cce5ff', 0.5);
        line([[1.2+t,0],[1.7, t*sqrt3]], '#ffe5e5', 0.5);
        line([[2.2-t,0],[1.7-t*0.5, t*sqrt3]], '#ffe5e5', 0.5);
    }
}

function line(points, color, w){
    let x=[],y=[];
    points.forEach(p=>{x.push(p.x||p[0]); y.push(p.y||p[1])});
    base.push({
        type:'scatter', x,y, mode:'lines',
        line:{color, width:w}, showlegend:false, hoverinfo:'skip'
    });
}

function showZones(){
    zones = [];
    let y = sqrt3;
    let z = [
        {pts:[[0.5,y],[0.925,y+0.15],[1.35,y]], col:'rgba(255,204,204,0.4)', txt:'6区：非碳酸硬度'},
        {pts:[[0.925,y+0.15],[1.1,y+0.3],[1.35,y+0.15]], col:'rgba(204,204,255,0.4)', txt:'9区：无主导离子'},
        {pts:[[0.85,y+0.3],[0.925,y+0.15],[1.1,y+0.3]], col:'rgba(204,255,204,0.4)', txt:'5区：碳酸硬度'},
        {pts:[[1.35,y],[1.35,y+0.15],[1.7,y]], col:'rgba(255,255,204,0.4)', txt:'7区：非碳酸碱金属'},
        {pts:[[1.1,y+0.3],[1.35,y+0.3],[1.7,y]], col:'rgba(255,204,255,0.4)', txt:'8区：碳酸碱金属'}
    ];
    z.forEach(item=>{
        let x=[],y=[];
        item.pts.forEach(p=>{x.push(p[0]);y.push(p[1])});
        zones.push({
            type:'scatter',x,y,mode:'lines',fill:'toself',
            fillcolor:item.col, line:{color:'#666',width:0.5}, showlegend:false
        });
        zones.push({
            type:'scatter',x:[x.reduce((a,b)=>a+b,0)/x.length],
            y:[y.reduce((a,b)=>a+b,0)/y.length],
            text:item.txt, mode:'text', textfont:{size:9}, showlegend:false
        });
    });
    refresh();
}

function hideZones(){
    zones = [];
    refresh();
}

function refresh(){
    Plotly.newPlot('plot', [...base, ...zones, ...data], {
        plot_bgcolor:'#f8fcff',
        xaxis:{range:[-0.2,2.4], showgrid:false, zeroline:false},
        yaxis:{range:[-0.2,1.5], showgrid:false, zeroline:false},
        title:{text:'地下水 Piper 三线图分析系统', font:{size:16}}
    }, {responsive:true})
}

function importExcel(){
    let inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.xlsx,.xls';
    inp.onchange = e=>{
        let f = e.target.files[0];
        let r = new FileReader();
        r.onload = ev=>{
            let wb = XLSX.read(ev.target.result);
            let arr = XLSX.utils.sheet_to_json(wb.Sheets[0],{header:1});
            process(arr);
        };
        r.readAsArrayBuffer(f);
    };
    inp.click();
}

function process(arr){
    data = [];
    allResult = [];
    let res = document.getElementById('result');
    let tab = document.getElementById('table');
    res.innerHTML = '';
    tab.innerHTML = '';

    for(let i=1;i<arr.length;i++){
        let row = arr[i];
        if(!row) continue;
        let NO = row[0] || i;
        let Ca = +row[1]||0, Mg=+row[2]||0, K=+row[3]||0, Na=+row[4]||0;
        let HCO3=+row[5]||0, CO3=+row[6]||0, SO4=+row[7]||0, Cl=+row[8]||0;

        // 当量浓度
        let caE = Ca/(CONST.Ca/2);
        let mgE = Mg/(CONST.Mg/2);
        let naE = Na/CONST.Na + K/CONST.K;
        let hcE = HCO3/CONST.HCO3 + CO3/(CONST.CO3/2);
        let soE = SO4/(CONST.SO4/2);
        let clE = Cl/CONST.Cl;

        let cTotal = caE+mgE+naE;
        let aTotal = hcE+soE+clE;

        let caP = (caE/cTotal*100).toFixed(1);
        let mgP = (mgE/cTotal*100).toFixed(1);
        let nkP = (naE/cTotal*100).toFixed(1);
        let hcP = (hcE/aTotal*100).toFixed(1);
        let soP = (soE/aTotal*100).toFixed(1);
        let clP = (clE/aTotal*100).toFixed(1);

        // 坐标
        let cx = caP*0/100 + mgP*0.5/100*100 + nkP*1/100;
        let cy = caP*0/100 + mgP*sqrt3/100*100 + nkP*0/100;
        let ax = clP*1.2/100 + soP*1.7/100*100 + hcP*2.2/100;
        let ay = clP*0/100 + soP*sqrt3/100*100 + hcP*0/100;
        let dx = 0.85 + nkP/100*0.5;
        let dy = sqrt3+0.15 - hcP/100*0.3;

        // 区域判断（完全匹配 VB 逻辑）
        let zone, type, quality;
        if(dx<1.1 && dy>sqrt3+0.15){
            zone = "5/6区"; type="碳酸盐型水"; quality="水质较好"
        }else if(dx>1.1 && dy>sqrt3+0.15){
            zone = "7/9区"; type="硫酸盐-氯化物型"; quality="水质一般"
        }else if(dx<1.1){
            zone = "5区"; type="钙镁型水"; quality="水质尚可"
        }else{
            zone = "8/9区"; type="钠型水"; quality="水质较差"
        }

        // 点
        point(cx,cy,NO,'blue','triangle-up');
        point(ax,ay,NO,'green','triangle-up');
        point(dx,dy,NO,'orange','circle');

        // 输出
        let txt = `[${NO}] Ca=${caP}% Mg=${mgP}% Na+K=${nkP}% HCO3=${hcP}% SO4=${soP}% Cl=${clP}% → ${zone} | ${type} | ${quality}<br><hr>`;
        res.innerHTML += txt;
        allResult.push({NO,caP,mgP,nkP,hcP,soP,clP,zone,type,quality});
    }

    // 表格
    let html = `<table><tr><th>序号</th><th>Ca%</th><th>Mg%</th><th>Na+K%</th><th>HCO3%</th><th>SO4%</th><th>Cl%</th><th>区域</th><th>类型</th></tr>`;
    allResult.forEach(it=>{
        html+=`<tr><td>${it.NO}</td><td>${it.caP}</td><td>${it.mgP}</td><td>${it.nkP}</td><td>${it.hcP}</td><td>${it.soP}</td><td>${it.clP}</td><td>${it.zone}</td><td>${it.type}</td></tr>`;
    })
    html+='</table>';
    tab.innerHTML = html;
    refresh();
}

function point(x,y,text,c,s){
    data.push({
        type:'scatter',x:[x],y:[y],mode:'markers+text',
        text:text, textposition:'top right', marker:{color:c,size:6,symbol:s},
        textfont:{size:9}, showlegend:false
    })
}

function exportPic(){
    Plotly.downloadImage('plot',{format:'png',width:1400,height:900,filename:'Piper三线图'})
}

function exportResult(){
    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.json_to_sheet(allResult);
    XLSX.utils.book_append_sheet(wb,ws,'分析结果');
    XLSX.writeFile(wb,'地下水Piper分析结果.xlsx');
}
</script>
</body>
</html>
