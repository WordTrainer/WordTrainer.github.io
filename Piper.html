<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地下水 Piper 三线图分析</title>
    <!-- 替换为更稳定的库版本，避免兼容性问题 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .container { width: 98%; margin: 10px auto; }
        #piperChart { width: 100%; height: 600px; border: 1px solid #eee; }
        .btn-group { margin: 10px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .common-btn {
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f8f8f8;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .common-btn:hover { background: #e8e8e8; border-color: #adadad; }
        .import-btn-wrap {
            position: relative;
            display: inline-block;
        }
        #excelFile {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }
        #dataTable {
            width: 100%; border-collapse: collapse; margin: 10px 0;
        }
        #dataTable th, #dataTable td {
            border: 1px solid #ccc; padding: 8px; text-align: center;
        }
        #dataTable th { background: #f2f2f2; }
        #dataTable tr.selected { background-color: #cce5ff; }
        #dataDetail {
            border: 1px solid #ccc; padding: 10px; min-height: 80px;
            background: #f9f9f9;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            z-index: 999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; padding: 20px; border-radius: 8px;
            width: 500px; box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .modal-form { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin: 15px 0; }
        .modal-form label { align-self: center; font-weight: 500; }
        .modal-form input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .modal-btns { text-align: right; margin-top: 20px; }
        .modal-btns button {
            padding: 8px 15px; margin-left: 10px;
            border: none; border-radius: 4px; cursor: pointer;
        }
        .btn-save { background: #007bff; color: #fff; }
        .btn-cancel { background: #6c757d; color: #fff; }
        .error-tip { color: #dc3545; font-size: 12px; margin-top: 5px; display: none; }
        .import-modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #fff;
            padding: 20px; border-radius: 8px; z-index: 1000;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            max-width: 600px;
        }
        .import-modal h4 { margin-top: 0; }
        .import-modal .error-list {
            max-height: 200px; overflow-y: auto;
            margin: 10px 0; padding-left: 20px;
            color: #dc3545;
        }
        .import-modal-btns { text-align: center; margin-top: 15px; }
        .import-modal-btns button {
            padding: 8px 20px; margin: 0 5px;
            border: none; border-radius: 4px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">地下水三线图分析</h2>
        <div id="piperChart"></div>
        <div class="btn-group">
            <button id="addRegion" class="common-btn">添加分区数据</button>
            <div class="import-btn-wrap">
                <button class="common-btn">从EXCEL导入</button>
                <input type="file" id="excelFile" accept=".xlsx,.xls">
            </div>
            <button id="addRegionLabel" class="common-btn">添加分区标注</button>
            <button id="delRegionLabel" class="common-btn">删除分区标注</button>
            <button id="exportChart" class="common-btn">导出三线图</button>
            <button id="exportDGV" class="common-btn">输出到DGV</button>
            <button id="exportExcel" class="common-btn">输出到EXCEL</button>
        </div>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>序号</th><th>Ca²+</th><th>Mg²+</th><th>Na++K+</th>
                    <th>HCO₃⁻+CO₃²⁻</th><th>SO₄²⁻</th><th>Cl⁻</th><th>操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="dataDetail"></div>
    </div>

    <div class="modal" id="dataModal">
        <div class="modal-content">
            <h3 id="modalTitle">添加分区数据</h3>
            <div class="error-tip" id="errorTip">数据校验失败，请检查！</div>
            <div class="modal-form">
                <label for="editId">序号：</label>
                <input type="number" id="editId" readonly placeholder="自动生成">
                <label for="editCa">Ca²+ (%)：</label>
                <input type="number" id="editCa" step="0.01" min="0" max="100" placeholder="请输入">
                <label for="editMg">Mg²+ (%)：</label>
                <input type="number" id="editMg" step="0.01" min="0" max="100" placeholder="请输入">
                <label for="editNaK">Na++K+ (%)：</label>
                <input type="number" id="editNaK" step="0.01" min="0" max="100" placeholder="请输入">
                <label for="editHCO3CO3">HCO₃⁻+CO₃²⁻ (%)：</label>
                <input type="number" id="editHCO3CO3" step="0.01" min="0" max="100" placeholder="请输入">
                <label for="editSO4">SO₄²⁻ (%)：</label>
                <input type="number" id="editSO4" step="0.01" min="0" max="100" placeholder="请输入">
                <label for="editCl">Cl⁻ (%)：</label>
                <input type="number" id="editCl" step="0.01" min="0" max="100" placeholder="请输入">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-save" onclick="saveData()">保存</button>
            </div>
        </div>
    </div>

    <div class="import-modal" id="importModal">
        <h4 id="importTitle">Excel导入结果</h4>
        <div id="importMsg">导入中...</div>
        <div class="error-list" id="importErrorList"></div>
        <div class="import-modal-btns">
            <button onclick="closeImportModal()">确定</button>
        </div>
    </div>

    <script>
        let piperData = [
            { id: 1, Ca: 10.28, Mg: 6.05, NaK: 83.67, HCO3CO3: 14.08, SO4: 79.27, Cl: 6.65 },
            { id: 2, Ca: 20.15, Mg: 12.30, NaK: 67.55, HCO3CO3: 18.25, SO4: 72.10, Cl: 9.65 },
            { id: 3, Ca: 8.39, Mg: 6.66, NaK: 84.95, HCO3CO3: 12.10, SO4: 80.50, Cl: 7.40 },
            { id: 4, Ca: 19.95, Mg: 13.92, NaK: 66.13, HCO3CO3: 15.30, SO4: 75.80, Cl: 8.90 },
            { id: 5, Ca: 15.76, Mg: 24.33, NaK: 59.91, HCO3CO3: 10.80, SO4: 82.50, Cl: 6.70 },
            { id: 6, Ca: 5.97, Mg: 45.20, NaK: 48.83, HCO3CO3: 9.50, SO4: 85.20, Cl: 5.30 },
            { id: 7, Ca: 9.34, Mg: 21.70, NaK: 68.96, HCO3CO3: 13.20, SO4: 78.50, Cl: 8.30 },
            { id: 8, Ca: 12.50, Mg: 18.40, NaK: 69.10, HCO3CO3: 11.80, SO4: 81.20, Cl: 7.00 },
            { id: 9, Ca: 7.80, Mg: 10.50, NaK: 81.70, HCO3CO3: 16.50, SO4: 76.30, Cl: 7.20 },
            { id:10, Ca: 6.50, Mg: 8.80, NaK: 84.70, HCO3CO3: 14.80, SO4: 79.80, Cl: 5.40 }
        ];
        let currentEditId = null;
        let myChart = null;

        // 坐标转换函数（不变）
        function cationTriCoord(Ca, Mg, NaK) {
            const baseX = 0.2;
            const baseY = 1.0;
            const sideLen = 1.0;
            const x = baseX + sideLen * (NaK/100 + Mg/200);
            const y = baseY - sideLen * (Math.sqrt(3)/2) * (Mg/100);
            return [x, y];
        }
        function anionTriCoord(HCO3CO3, SO4, Cl) {
            const baseX = 1.8;
            const baseY = 1.0;
            const sideLen = 1.0;
            const x = baseX - sideLen * (Cl/100 + SO4/200);
            const y = baseY - sideLen * (Math.sqrt(3)/2) * (SO4/100);
            return [x, y];
        }
        function diamondCoord(cationXY, anionXY) {
            const leftTriRightX = 1.2;
            const rightTriLeftX = 1.2;
            const diamondBaseY = 0.2;
            const x = leftTriRightX + (anionXY[0] - rightTriLeftX) * 0.8;
            const y = diamondBaseY + (cationXY[1] + anionXY[1]) / 2;
            return [x, y];
        }

        // 初始化图表（不变）
        function initChart() {
            const chartDom = document.getElementById('piperChart');
            myChart = echarts.init(chartDom);
            updateChartData();
            window.addEventListener('resize', () => myChart.resize());
        }

        // 更新图表数据（不变）
        function updateChartData() {
            const cationPoints = [];
            const anionPoints = [];
            const diamondPoints = [];
            piperData.forEach(item => {
                const cXY = cationTriCoord(item.Ca, item.Mg, item.NaK);
                cationPoints.push({
                    value: [cXY[0], cXY[1]],
                    name: `点${item.id}`,
                    itemStyle: { color: '#1E90FF' }
                });
                const aXY = anionTriCoord(item.HCO3CO3, item.SO4, item.Cl);
                anionPoints.push({
                    value: [aXY[0], aXY[1]],
                    name: `点${item.id}`,
                    itemStyle: { color: '#228B22' }
                });
                const dXY = diamondCoord(cXY, aXY);
                diamondPoints.push({
                    value: [dXY[0], dXY[1]],
                    name: `点${item.id}`,
                    label: { show: true, formatter: item.id, fontSize: 12 },
                    itemStyle: { color: '#FF8C00' }
                });
            });

            const option = {
                title: { show: false },
                tooltip: {
                    trigger: 'item',
                    formatter: (params) => {
                        const data = piperData[params.dataIndex];
                        return `
                            数据点${data.id}<br/>
                            阳离子：Ca²+${data.Ca.toFixed(2)}% | Mg²+${data.Mg.toFixed(2)}% | Na++K+${data.NaK.toFixed(2)}%<br/>
                            阴离子：HCO₃⁻+CO₃²⁻${data.HCO3CO3.toFixed(2)}% | SO₄²⁻${data.SO4.toFixed(2)}% | Cl⁻${data.Cl.toFixed(2)}%
                        `;
                    }
                },
                grid: { left: '2%', right: '2%', top: '5%', bottom: '5%', containLabel: true },
                xAxis: {
                    type: 'value', min: 0, max: 2.5,
                    axisLine: { show: false }, axisTick: { show: false },
                    axisLabel: { show: false }, splitLine: { show: false }
                },
                yAxis: {
                    type: 'value', min: 0, max: 1.8,
                    axisLine: { show: false }, axisTick: { show: false },
                    axisLabel: { show: false }, splitLine: { show: false }
                },
                series: [
                    {
                        name: '阳离子三角', type: 'polygon', z: 1,
                        itemStyle: { color: 'transparent', borderColor: '#1E90FF', borderWidth: 2 },
                        data: [[0.2, 1.0], [1.2, 1.0], [0.7, 1.0 - Math.sqrt(3)/2 * 1.0]]
                    },
                    {
                        name: '左三角网格', type: 'line', z: 2,
                        lineStyle: { color: '#B0C4DE', type: 'dashed', width: 1 },
                        data: (() => {
                            const lines = [];
                            for (let p = 20; p <= 80; p += 20) {
                                const x1 = 0.2 + (1.0 * p / 100);
                                const y1 = 1.0;
                                const x2 = 0.7 - (0.5 * p / 100);
                                const y2 = 1.0 - Math.sqrt(3)/2 * (p / 100);
                                lines.push([[x1, y1], [x2, y2]]);
                            }
                            for (let p = 20; p <= 80; p += 20) {
                                const x1 = 0.7 + (0.5 * p / 100);
                                const y1 = 1.0 - Math.sqrt(3)/2 * (p / 100);
                                const x2 = 0.2 + (1.0 * (100-p) / 100);
                                const y2 = 1.0;
                                lines.push([[x1, y1], [x2, y2]]);
                            }
                            return lines;
                        })()
                    },
                    {
                        name: '左三角标注', type: 'scatter', z: 3, symbol: 'none',
                        label: { show: true, fontSize: 11, color: '#1E90FF' },
                        data: [
                            { value: [0.15, 1.0], label: { formatter: 'Ca²+' } },
                            { value: [1.25, 1.0], label: { formatter: 'Na++K+' } },
                            { value: [0.7, 0.1], label: { formatter: 'Mg²+' } },
                            { value: [0.3, 1.0], label: { formatter: '80%' } },
                            { value: [0.5, 1.0], label: { formatter: '60%' } },
                            { value: [0.7, 1.0], label: { formatter: '40%' } },
                            { value: [0.9, 1.0], label: { formatter: '20%' } },
                        ]
                    },
                    { name: '阳离子数据点', type: 'scatter', z: 4, symbolSize: 8, data: cationPoints },
                    {
                        name: '阴离子三角', type: 'polygon', z: 1,
                        itemStyle: { color: 'transparent', borderColor: '#DC143C', borderWidth: 2 },
                        data: [[1.3, 1.0], [2.3, 1.0], [1.8, 1.0 - Math.sqrt(3)/2 * 1.0]]
                    },
                    {
                        name: '右三角网格', type: 'line', z: 2,
                        lineStyle: { color: '#F08080', type: 'dashed', width: 1 },
                        data: (() => {
                            const lines = [];
                            for (let p = 20; p <= 80; p += 20) {
                                const x1 = 1.3 + (1.0 * p / 100);
                                const y1 = 1.0;
                                const x2 = 1.8 - (0.5 * p / 100);
                                const y2 = 1.0 - Math.sqrt(3)/2 * (p / 100);
                                lines.push([[x1, y1], [x2, y2]]);
                            }
                            for (let p = 20; p <= 80; p += 20) {
                                const x1 = 1.8 + (0.5 * p / 100);
                                const y1 = 1.0 - Math.sqrt(3)/2 * (p / 100);
                                const x2 = 1.3 + (1.0 * (100-p) / 100);
                                const y2 = 1.0;
                                lines.push([[x1, y1], [x2, y2]]);
                            }
                            return lines;
                        })()
                    },
                    {
                        name: '右三角标注', type: 'scatter', z: 3, symbol: 'none',
                        label: { show: true, fontSize: 11, color: '#DC143C' },
                        data: [
                            { value: [1.25, 1.0], label: { formatter: 'HCO₃⁻+CO₃²⁻' } },
                            { value: [2.35, 1.0], label: { formatter: 'Cl⁻' } },
                            { value: [1.8, 0.1], label: { formatter: 'SO₄²⁻' } },
                            { value: [1.5, 1.0], label: { formatter: '80%' } },
                            { value: [1.7, 1.0], label: { formatter: '60%' } },
                            { value: [1.9, 1.0], label: { formatter: '40%' } },
                            { value: [2.1, 1.0], label: { formatter: '20%' } },
                        ]
                    },
                    { name: '阴离子数据点', type: 'scatter', z: 4, symbolSize: 8, data: anionPoints },
                    {
                        name: '中间菱形', type: 'polygon', z: 1,
                        itemStyle: { color: 'transparent', borderColor: '#228B22', borderWidth: 2 },
                        data: [[1.2, 0.2], [1.8, 0.2], [1.8, 1.2], [1.2, 1.2]]
                    },
                    {
                        name: '菱形网格', type: 'line', z: 2,
                        lineStyle: { color: '#90EE90', type: 'dashed', width: 1 },
                        data: (() => {
                            const lines = [];
                            for (let p = 20; p <= 80; p += 20) {
                                const y = 0.2 + (1.0 * p / 100);
                                lines.push([[1.2, y], [1.8, y]]);
                            }
                            for (let p = 20; p <= 80; p += 20) {
                                const x = 1.2 + (0.6 * p / 100);
                                lines.push([[x, 0.2], [x, 1.2]]);
                            }
                            lines.push([[1.2, 0.2], [1.8, 1.2]]);
                            lines.push([[1.8, 0.2], [1.2, 1.2]]);
                            return lines;
                        })()
                    },
                    {
                        name: '菱形标注', type: 'scatter', z: 3, symbol: 'none',
                        label: { show: true, fontSize: 11, color: '#228B22' },
                        data: [
                            { value: [1.15, 0.4], label: { formatter: '20%' } },
                            { value: [1.15, 0.6], label: { formatter: '40%' } },
                            { value: [1.15, 0.8], label: { formatter: '60%' } },
                            { value: [1.15, 1.0], label: { formatter: '80%' } },
                            { value: [1.32, 0.15], label: { formatter: '20%' } },
                            { value: [1.48, 0.15], label: { formatter: '40%' } },
                            { value: [1.64, 0.15], label: { formatter: '60%' } },
                            { value: [1.8, 0.15],  label: { formatter: '80%' } },
                        ]
                    },
                    { name: '菱形数据点', type: 'scatter', z: 4, symbolSize: 10, data: diamondPoints }
                ]
            };
            myChart.setOption(option, true);
        }

        // 渲染表格（不变）
        function renderTable() {
            const tableBody = $('#dataTable tbody');
            tableBody.empty();
            piperData.forEach(item => {
                const tr = $(`<tr data-index="${item.id-1}"></tr>`);
                tr.append(`<td>${item.id}</td>`);
                tr.append(`<td>${item.Ca.toFixed(2)}</td>`);
                tr.append(`<td>${item.Mg.toFixed(2)}</td>`);
                tr.append(`<td>${item.NaK.toFixed(2)}</td>`);
                tr.append(`<td>${item.HCO3CO3.toFixed(2)}</td>`);
                tr.append(`<td>${item.SO4.toFixed(2)}</td>`);
                tr.append(`<td>${item.Cl.toFixed(2)}</td>`);
                tr.append(`<td>
                    <button onclick="editData(${item.id})">编辑</button>
                    <button onclick="deleteData(${item.id})">删除</button>
                </td>`);
                tableBody.append(tr);
            });
            $('#dataTable tbody tr').click(function(e) {
                if (!$(e.target).is('button')) {
                    $('#dataTable tbody tr').removeClass('selected');
                    $(this).addClass('selected');
                    const idx = $(this).data('index');
                    const data = piperData[idx];
                    $('#dataDetail').html(`
                        [数据点 ${data.id}]<br/>
                        阳离子百分比：Ca²+${data.Ca.toFixed(2)}% | Mg²+${data.Mg.toFixed(2)}% | Na++K+${data.NaK.toFixed(2)}%<br/>
                        阴离子百分比：HCO₃⁻+CO₃²⁻${data.HCO3CO3.toFixed(2)}% | SO₄²⁻${data.SO4.toFixed(2)}% | Cl⁻${data.Cl.toFixed(2)}%<br/>
                        水质评估：钠-氯化物型水，水质较差（受Na+、Cl-污染）
                    `);
                }
            });
            if (piperData.length > 0) {
                $('#dataTable tbody tr:first').click();
            }
        }

        // 弹窗操作（仅移除保存时的百分比校验）
        function openModal(id = null) {
            currentEditId = id;
            const modal = document.getElementById('dataModal');
            const modalTitle = document.getElementById('modalTitle');
            const editId = document.getElementById('editId');
            const errorTip = document.getElementById('errorTip');
            errorTip.style.display = 'none';

            document.getElementById('editCa').value = '';
            document.getElementById('editMg').value = '';
            document.getElementById('editNaK').value = '';
            document.getElementById('editHCO3CO3').value = '';
            document.getElementById('editSO4').value = '';
            document.getElementById('editCl').value = '';

            if (id) {
                modalTitle.innerText = '编辑分区数据';
                const data = piperData.find(item => item.id === id);
                editId.value = data.id;
                document.getElementById('editCa').value = data.Ca;
                document.getElementById('editMg').value = data.Mg;
                document.getElementById('editNaK').value = data.NaK;
                document.getElementById('editHCO3CO3').value = data.HCO3CO3;
                document.getElementById('editSO4').value = data.SO4;
                document.getElementById('editCl').value = data.Cl;
            } else {
                modalTitle.innerText = '添加分区数据';
                const newId = piperData.length > 0 ? Math.max(...piperData.map(item => item.id)) + 1 : 1;
                editId.value = newId;
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('dataModal').style.display = 'none';
            currentEditId = null;
        }

        // 核心修改：移除百分比总和校验
        function saveData() {
            const errorTip = document.getElementById('errorTip');
            const id = parseInt(document.getElementById('editId').value);
            const Ca = parseFloat(document.getElementById('editCa').value) || 0;
            const Mg = parseFloat(document.getElementById('editMg').value) || 0;
            const NaK = parseFloat(document.getElementById('editNaK').value) || 0;
            const HCO3CO3 = parseFloat(document.getElementById('editHCO3CO3').value) || 0;
            const SO4 = parseFloat(document.getElementById('editSO4').value) || 0;
            const Cl = parseFloat(document.getElementById('editCl').value) || 0;

            // 仅校验非负（移除百分比总和校验）
            if (Ca < 0 || Mg < 0 || NaK < 0 || HCO3CO3 < 0 || SO4 < 0 || Cl < 0) {
                errorTip.innerText = '数据不能为负数！';
                errorTip.style.display = 'block';
                return;
            }

            if (currentEditId) {
                const idx = piperData.findIndex(item => item.id === currentEditId);
                piperData[idx] = { id, Ca, Mg, NaK, HCO3CO3, SO4, Cl };
            } else {
                piperData.push({ id, Ca, Mg, NaK, HCO3CO3, SO4, Cl });
            }

            updateChartData();
            renderTable();
            closeModal();
            alert('数据保存成功！');
        }

        function editData(id) {
            openModal(id);
        }

        function deleteData(id) {
            if (confirm(`确定删除数据点${id}吗？`)) {
                piperData = piperData.filter(item => item.id !== id);
                piperData.forEach((item, idx) => { item.id = idx + 1; });
                updateChartData();
                renderTable();
                alert('数据删除成功！');
            }
        }

        // 核心修复：重构Excel导入逻辑，解决getProgressive报错
        function importExcel(file) {
            // 禁用文件选择器，避免重复上传
            document.getElementById('excelFile').disabled = true;
            
            const reader = new FileReader();
            // 改用readAsBinaryString避免Uint8Array兼容性问题
            reader.readAsBinaryString(file);
            
            reader.onload = function(e) {
                try {
                    // 修复xlsx解析参数，避免getProgressive异常
                    const workbook = XLSX.read(e.target.result, { 
                        type: 'binary',
                        cellDates: false,
                        cellText: true,
                        cellNF: false
                    });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 读取所有数据（二维数组格式，避免header匹配问题）
                    const excelData = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: true });
                    const importList = [];
                    const errorList = [];

                    // 第一步：提取表头行（第0行），强化模糊匹配
                    const headerRow = excelData[0] || [];
                    const colMap = {
                        id: -1,
                        Ca: -1,
                        Mg: -1,
                        K: -1,
                        Na: -1,
                        HCO3: -1,
                        CO3: -1,
                        SO4: -1,
                        Cl: -1
                    };

                    // 强化模糊匹配：兼容更多列名写法
                    headerRow.forEach((colName, idx) => {
                        if (typeof colName !== 'string') return;
                        const name = colName.toLowerCase()
                            .replace(/[\u4e00-\u9fa5]/g, '') // 移除中文
                            .replace(/[^a-z0-9]/g, '') // 移除特殊符号
                            .replace(/plus|\+/g, '') // 移除+号相关
                            .replace(/2/g, '') // 移除数字2
                            .trim();
                        
                        if (name.includes('xuhao') || name.includes('id') || name.includes('xh')) colMap.id = idx;
                        if (name.includes('ca') || name.includes('gai')) colMap.Ca = idx;
                        if (name.includes('mg') || name.includes('mei')) colMap.Mg = idx;
                        if (name.includes('k') || name.includes('jia')) colMap.K = idx;
                        if (name.includes('na') || name.includes('na')) colMap.Na = idx;
                        if (name.includes('hco3') || name.includes('tanqinggensu')) colMap.HCO3 = idx;
                        if (name.includes('co3') || name.includes('tansuangen')) colMap.CO3 = idx;
                        if (name.includes('so4') || name.includes('liusuangen')) colMap.SO4 = idx;
                        if (name.includes('cl') || name.includes('lü')) colMap.Cl = idx;
                    });

                    // 校验必须的列是否存在
                    const requiredCols = ['Ca', 'Mg', 'K', 'Na', 'HCO3', 'CO3', 'SO4', 'Cl'];
                    const missingCols = requiredCols.filter(col => colMap[col] === -1);
                    if (missingCols.length > 0) {
                        errorList.push(`缺少必要列：${missingCols.join(', ')}，请检查Excel列名`);
                        throw new Error(`列名匹配失败：缺少${missingCols.join(', ')}列`);
                    }

                    // 第二步：处理数据行（从第1行开始）
                    for (let i = 1; i < excelData.length; i++) {
                        const row = excelData[i];
                        if (!row || row.length === 0) continue; // 跳过空行

                        // 安全取值：避免行长度不足导致undefined
                        const getCellValue = (colIdx) => {
                            if (row.length <= colIdx || row[colIdx] === undefined || row[colIdx] === null) return 0;
                            return parseFloat(row[colIdx]) || 0;
                        };

                        // 提取数据（安全取值）
                        const id = colMap.id !== -1 ? (parseInt(getCellValue(colMap.id)) || (i)) : i;
                        const Ca = getCellValue(colMap.Ca);
                        const Mg = getCellValue(colMap.Mg);
                        const K = getCellValue(colMap.K);
                        const Na = getCellValue(colMap.Na);
                        const HCO3 = getCellValue(colMap.HCO3);
                        const CO3 = getCellValue(colMap.CO3);
                        const SO4 = getCellValue(colMap.SO4);
                        const Cl = getCellValue(colMap.Cl);

                        // 合并列
                        const NaK = Na + K;
                        const HCO3CO3 = HCO3 + CO3;

                        // 计算总和（避免除以0）
                        const cationTotal = Ca + Mg + NaK;
                        const anionTotal = HCO3CO3 + SO4 + Cl;

                        if (cationTotal === 0 || anionTotal === 0) {
                            errorList.push(`第${i+1}行：阳离子/阴离子总含量为0，跳过该行`);
                            continue;
                        }

                        // 强制转换为百分比（保留2位小数）
                        const CaPercent = Number((Ca / cationTotal * 100).toFixed(2));
                        const MgPercent = Number((Mg / cationTotal * 100).toFixed(2));
                        const NaKPercent = Number((NaK / cationTotal * 100).toFixed(2));
                        const HCO3CO3Percent = Number((HCO3CO3 / anionTotal * 100).toFixed(2));
                        const SO4Percent = Number((SO4 / anionTotal * 100).toFixed(2));
                        const ClPercent = Number((Cl / anionTotal * 100).toFixed(2));

                        importList.push({
                            id,
                            Ca: CaPercent,
                            Mg: MgPercent,
                            NaK: NaKPercent,
                            HCO3CO3: HCO3CO3Percent,
                            SO4: SO4Percent,
                            Cl: ClPercent
                        });
                    }

                    // 处理导入结果（异步弹窗避免阻塞）
                    setTimeout(() => {
                        const importTitle = document.getElementById('importTitle');
                        const importMsg = document.getElementById('importMsg');
                        const importErrorList = document.getElementById('importErrorList');

                        if (importList.length > 0) {
                            // 修复确认弹窗干扰问题
                            try {
                                const isCover = confirm(`成功解析${importList.length}条有效数据（原始含量→百分比转换完成），是否覆盖原有数据？（取消则追加）`);
                                if (isCover) {
                                    piperData = importList;
                                    piperData.forEach((item, idx) => { item.id = idx + 1; });
                                    importTitle.innerText = 'Excel导入成功';
                                    importMsg.innerText = `已覆盖原有数据，共导入${importList.length}条有效数据`;
                                } else {
                                    const maxId = piperData.length > 0 ? Math.max(...piperData.map(item => item.id)) : 0;
                                    importList.forEach((item, idx) => {
                                        item.id = maxId + idx + 1;
                                        piperData.push(item);
                                    });
                                    importTitle.innerText = 'Excel导入成功';
                                    importMsg.innerText = `已追加${importList.length}条有效数据，当前总数据量：${piperData.length}条`;
                                }
                                updateChartData();
                                renderTable();
                            } catch (e) {
                                errorList.push('确认弹窗操作异常，已默认追加数据');
                                const maxId = piperData.length > 0 ? Math.max(...piperData.map(item => item.id)) : 0;
                                importList.forEach((item, idx) => {
                                    item.id = maxId + idx + 1;
                                    piperData.push(item);
                                });
                            }
                        } else {
                            importTitle.innerText = 'Excel导入失败';
                            importMsg.innerText = '未解析到有效数据，请检查Excel数据！';
                        }

                        // 显示错误信息
                        importErrorList.innerHTML = errorList.length > 0 
                            ? errorList.map(err => `<li>${err}</li>`).join('') 
                            : '';

                        document.getElementById('importModal').style.display = 'block';
                    }, 100);

                } catch (err) {
                    console.error('Excel解析失败：', err);
                    document.getElementById('importTitle').innerText = 'Excel导入异常';
                    document.getElementById('importMsg').innerText = `解析失败：${err.message || '未知错误'}`;
                    document.getElementById('importErrorList').innerHTML = '';
                    document.getElementById('importModal').style.display = 'block';
                } finally {
                    // 恢复文件选择器
                    document.getElementById('excelFile').disabled = false;
                }
            };

            // 捕获读取错误
            reader.onerror = function(err) {
                console.error('文件读取失败：', err);
                document.getElementById('importTitle').innerText = '文件读取失败';
                document.getElementById('importMsg').innerText = '无法读取文件，请检查文件是否损坏';
                document.getElementById('importModal').style.display = 'block';
                document.getElementById('excelFile').disabled = false;
            };
        }

        function closeImportModal() {
            document.getElementById('importModal').style.display = 'none';
            document.getElementById('excelFile').value = '';
        }

        // 按钮绑定（优化文件选择逻辑）
        document.getElementById('addRegion').addEventListener('click', () => openModal());
        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext !== 'xlsx' && ext !== 'xls') {
                alert('请上传.xlsx或.xls格式的Excel文件！');
                this.value = '';
                return;
            }
            
            // 延迟执行，避免浏览器渲染阻塞
            setTimeout(() => importExcel(file), 50);
        });
        document.getElementById('addRegionLabel').addEventListener('click', () => {
            alert('【添加分区标注】功能：可扩展实现菱形分区（如5/6/7/8/9区）的颜色标注，如需实现可补充annotation配置');
        });
        document.getElementById('delRegionLabel').addEventListener('click', () => {
            alert('【删除分区标注】功能：可扩展删除已添加的分区标注，如需实现可清空ECharts的annotation配置');
        });
        document.getElementById('exportChart').addEventListener('click', () => {
            const img = myChart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#fff' });
            const a = document.createElement('a');
            a.href = img; a.download = 'Piper三线图.png'; a.click();
        });
        document.getElementById('exportDGV').addEventListener('click', () => {
            alert('【输出到DGV】功能：可扩展导出数据到DataGridView（需结合后端语言如C#实现）');
        });
        document.getElementById('exportExcel').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(piperData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Piper数据（百分比）');
            XLSX.writeFile(wb, 'Piper三线图数据（百分比）.xlsx');
        });

        // 初始化
        window.onload = function() {
            initChart();
            renderTable();
            // 修复模态框样式
            document.querySelectorAll('.modal').forEach(modal => {
                modal.style.alignItems = 'center';
                modal.style.justifyContent = 'center';
            });
        };
    </script>
</body>
