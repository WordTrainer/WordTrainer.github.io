<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地下水三线图分析</title>
    <!-- 引入ECharts核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <!-- 引入jQuery（用于表格和按钮交互） -->
    <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
    <!-- 引入SheetJS（用于Excel导出） -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        /* 整体布局样式 */
        .container {
            width: 95%;
            margin: 20px auto;
        }
        /* 图表容器 */
        #tripleChart {
            width: 100%;
            height: 500px;
            border: 1px solid #eee;
            margin-bottom: 10px;
        }
        /* 数据表格样式 */
        #dataTable {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        #dataTable th, #dataTable td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }
        #dataTable th {
            background-color: #f2f2f2;
        }
        #dataTable tr.selected {
            background-color: #cce5ff;
        }
        /* 按钮组样式 */
        .btn-group {
            margin-bottom: 10px;
        }
        .btn-group button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f8f8f8;
        }
        .btn-group button:hover {
            background-color: #e8e8e8;
        }
        /* 数据详情面板 */
        #dataDetail {
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 120px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">地下水三线图分析</h2>
        <!-- 三线图容器 -->
        <div id="tripleChart"></div>
        <!-- 操作按钮组 -->
        <div class="btn-group">
            <button id="addRegion">添加分区数据</button>
            <button id="addRegionLabel">添加分区标注</button>
            <button id="delRegionLabel">删除分区标注</button>
            <button id="exportChart">导出三线图</button>
            <button id="exportDGV">输出到DGV</button>
            <button id="exportExcel">输出到EXCEL</button>
        </div>
        <!-- 数据表格 -->
        <table id="dataTable">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>Ca2+</th>
                    <th>Mg2+</th>
                    <th>Na+</th>
                    <th>K+</th>
                    <th>HCO3-</th>
                    <th>SO4²-</th>
                    <th>Cl-</th>
                </tr>
            </thead>
            <tbody>
                <!-- 表格数据由JS动态填充 -->
            </tbody>
        </table>
        <!-- 数据详情面板 -->
        <div id="dataDetail"></div>
    </div>

    <script>
        // 1. 初始化示例数据（与效果图匹配）
        const sampleData = [
            { 序号: 1, Ca2p: 10.28, Mg2p: 6.05, Nap: 43.85, Kp: 10.95, HCO3n: 14.08, SO42n: 79.27, Cln: 6.65 },
            { 序号: 2, Ca2p: 273.96, Mg2p: 33.41, Nap: 43.85, Kp: 10.95, HCO3n: 14.08, SO42n: 79.27, Cln: 6.65 },
            { 序号: 3, Ca2p: 83.86, Mg2p: 6.66, Nap: 43.85, Kp: 10.95, HCO3n: 14.08, SO42n: 79.27, Cln: 6.65 },
            { 序号: 4, Ca2p: 199.48, Mg2p: 13.92, Nap: 43.85, Kp: 10.95, HCO3n: 14.08, SO42n: 79.27, Cln: 6.65 },
            { 序号: 5, Ca2p: 157.55, Mg2p: 24.33, Nap: 43.85, Kp: 10.95, HCO3n: 14.08, SO42n: 79.27, Cln: 6.65 },
            { 序号: 6, Ca2p: 59.7, Mg2p: 45.2, Nap: 43.85, Kp: 10.95, HCO3n: 14.08, SO42n: 79.27, Cln: 6.65 },
            { 序号: 7, Ca2p: 93.4, Mg2p: 21.7, Nap: 43.85, Kp: 10.95, HCO3n: 14.08, SO42n: 79.27, Cln: 6.65 }
        ];

        // 2. 初始化ECharts图表
        const chartDom = document.getElementById('tripleChart');
        const myChart = echarts.init(chartDom);
        
        // 三线图核心配置
        const option = {
            title: { show: false },
            tooltip: {
                trigger: 'item',
                formatter: function (params) {
                    return `数据点${params.dataIndex+1}<br/>${params.seriesName}: ${params.value}`;
                }
            },
            grid: {
                left: '5%',
                right: '5%',
                top: '10%',
                bottom: '10%',
                containLabel: true
            },
            xAxis: {
                name: 'X轴',
                type: 'value',
                min: 0,
                max: 2,
                axisLine: { lineStyle: { color: '#000' } }
            },
            yAxis: {
                name: 'Y轴',
                type: 'value',
                min: 0,
                max: 2,
                axisLine: { lineStyle: { color: '#000' } }
            },
            series: [
                // 左侧三角形（Ca2+/Mg2+）
                {
                    name: '阳离子(钙镁)',
                    type: 'scatter',
                    symbolSize: 12,
                    color: '#1E90FF',
                    data: sampleData.map(item => [
                        item.Ca2p / 300 * 0.8,  // X轴映射（适配三角形范围）
                        item.Mg2p / 50 * 0.8,   // Y轴映射
                        `Ca2+: ${item.Ca2p}<br/>Mg2+: ${item.Mg2p}`
                    ])
                },
                // 中间菱形（HCO3-/SO42-）
                {
                    name: '阴离子(碳酸氢根/硫酸根)',
                    type: 'scatter',
                    symbolSize: 12,
                    color: '#FF8C00',
                    data: sampleData.map(item => [
                        1 + item.HCO3n / 20 * 0.4,  // X轴偏移（菱形居中）
                        item.SO42n / 100 * 0.8,     // Y轴映射
                        `HCO3-: ${item.HCO3n}<br/>SO4²-: ${item.SO42n}`
                    ])
                },
                // 右侧三角形（Cl-）
                {
                    name: '阴离子(氯离子)',
                    type: 'scatter',
                    symbolSize: 12,
                    color: '#228B22',
                    data: sampleData.map(item => [
                        1.2 + item.Cln / 10 * 0.6,  // X轴偏移（右侧三角形）
                        item.Cln / 10 * 0.8,        // Y轴映射
                        `Cl-: ${item.Cln}`
                    ])
                },
                // 三线图网格标注（模拟百分比网格）
                {
                    name: '网格标注',
                    type: 'graph',
                    coordinateSystem: 'cartesian2d',
                    symbol: 'none',
                    links: [
                        // 左侧三角形网格线（示例）
                        { source: [0,0], target: [0.8,0] },
                        { source: [0,0], target: [0,0.8] },
                        { source: [0.8,0], target: [0,0.8] },
                        // 中间菱形网格线（示例）
                        { source: [0.8,0], target: [1.2,0.8] },
                        { source: [1.2,0], target: [0.8,0.8] },
                        // 右侧三角形网格线（示例）
                        { source: [1.2,0], target: [2,0] },
                        { source: [1.2,0], target: [1.2,0.8] },
                        { source: [2,0], target: [1.2,0.8] }
                    ],
                    lineStyle: { color: '#ccc', type: 'dashed' }
                }
            ]
        };

        // 渲染图表
        myChart.setOption(option);
        window.addEventListener('resize', () => myChart.resize());

        // 3. 填充数据表格
        const tableBody = $('#dataTable tbody');
        sampleData.forEach((item, index) => {
            const tr = $(`<tr data-index="${index}"></tr>`);
            tr.append(`<td>${item.序号}</td>`);
            tr.append(`<td>${item.Ca2p}</td>`);
            tr.append(`<td>${item.Mg2p}</td>`);
            tr.append(`<td>${item.Nap}</td>`);
            tr.append(`<td>${item.Kp}</td>`);
            tr.append(`<td>${item.HCO3n}</td>`);
            tr.append(`<td>${item.SO42n}</td>`);
            tr.append(`<td>${item.Cln}</td>`);
            tableBody.append(tr);
        });

        // 4. 表格行选中事件（显示详情）
        $('#dataTable tbody tr').click(function() {
            // 取消其他行选中，高亮当前行
            $('#dataTable tbody tr').removeClass('selected');
            $(this).addClass('selected');
            // 获取选中行数据
            const index = $(this).data('index');
            const data = sampleData[index];
            // 渲染详情面板
            const detailHtml = `
                [数据点 ${index+1}] Ca=${data.Ca2p} | Mg=${data.Mg2p} | Na+K=${data.Nap+data.Kp}<br/>
                HCO3=${data.HCO3n} | SO4=${data.SO42n} | Cl=${data.Cln}<br/>
                ───────────────────────────────────<br/>
                [数据点${index+1}位于第2、4、8区]<br/>
                → 化学类型：钠-氯化物型水, 水质评估：水质较差<br/>
                → 可能受到较多的钠离子和氯离子污染。
            `;
            $('#dataDetail').html(detailHtml);
        });

        // 5. 按钮功能实现
        // 导出图表
        $('#exportChart').click(function() {
            const imgUrl = myChart.getDataURL({
                type: 'png',
                pixelRatio: 2,
                backgroundColor: '#fff'
            });
            const a = document.createElement('a');
            a.href = imgUrl;
            a.download = '地下水三线图.png';
            a.click();
        });

        // 导出Excel
        $('#exportExcel').click(function() {
            const ws = XLSX.utils.json_to_sheet(sampleData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '三线图数据');
            XLSX.writeFile(wb, '地下水三线图数据.xlsx');
        });

        // 其他按钮（占位，可扩展）
        $('#addRegion, #addRegionLabel, #delRegionLabel, #exportDGV').click(function() {
            alert(`【${$(this).text()}】功能待扩展，可根据业务逻辑补充实现`);
        });

        // 初始化选中第一行
        $('#dataTable tbody tr:first').click();
    </script>
</body>
</html>
