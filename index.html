<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordTrainer - 主页导航</title>
<style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {
        background:#f5f5f5;
        font-family:Arial, sans-serif;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        padding:20px;
    }
    h1 {color:#333; margin-bottom:40px; font-size:32px;}
    .page-buttons {
        display:flex;
        flex-direction:column;
        gap:20px;
        width:100%;
        max-width:400px;
    }
    .page-btn {
        padding:20px;
        font-size:20px;
        border:none;
        border-radius:10px;
        background:#2ea44f;
        color:white;
        cursor:pointer;
        transition:background 0.3s;
    }
    .page-btn:hover {
        background:#2c974b;
        transform:scale(1.02);
    }
</style>
</head>
<body>
<h1>WordTrainer 工具导航</h1>

<div class="page-buttons">
    <!-- 跳转单词训练主页面（index.html 本身也可作为功能页，这里示例跳转到自身） -->
    <button class="page-btn" onclick="window.location.href='./index.html'">
        1. 单词训练主页面
    </button>
    <!-- 跳转挪车付费页面（TwoCode.html） -->
    <button class="page-btn" onclick="window.location.href='./TwoCode.html'">
        2. 挪车付费页面
    </button>
    <!-- 跳转错题本页面（errorBook.html） -->
    <button class="page-btn" onclick="window.location.href='./errorBook.html'">
        3. 单词错题本页面
    </button>
</div>

</body>
</html>
