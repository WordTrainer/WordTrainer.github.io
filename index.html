<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordTrainer - 所有工具入口</title>
<style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
    body {background:#f5f5f5; padding:30px; max-width:1200px; margin:0 auto;}
    
    /* 标题+导航样式 */
    h1 {color:#333; margin-bottom:20px; text-align:center;}
    .nav-buttons {
        display:flex;
        gap:15px;
        justify-content:center;
        margin-bottom:30px;
        flex-wrap:wrap;
    }
    .nav-buttons button {
        padding:12px 24px;
        border:none;
        border-radius:8px;
        background:#2ea44f;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:background 0.2s;
    }
    .nav-buttons button:hover {background:#2c974b;}
    
    /* 网页显示区域（支持同时显示多个） */
    .pages-container {
        display:grid;
        grid-template-columns:1fr 1fr 1fr; /* 三栏布局，同时显示3个网页 */
        gap:20px;
        height:70vh;
    }
    .page-item {
        background:white;
        border-radius:10px;
        box-shadow:0 2px 8px rgba(0,0,0,0.1);
        overflow:hidden;
    }
    iframe {
        width:100%;
        height:100%;
        border:none;
    }
    
    /* 适配手机：手机上改为单列显示 */
    @media (max-width:768px) {
        .pages-container {
            grid-template-columns:1fr;
            height:auto;
        }
        .page-item {
            height:400px;
            margin-bottom:20px;
        }
    }
</style>
</head>
<body>
<h1>WordTrainer 单词训练工具（3个网页入口）</h1>

<!-- 导航按钮：点击可切换显示/单独打开 -->
<div class="nav-buttons">
    <button onclick="openSinglePage('index.html')">单独打开 - 单词训练主页面</button>
    <button onclick="openSinglePage('TwoCode.html')">单独打开 - 挪车付费页面</button>
    <button onclick="openSinglePage('errorBook.html')">单独打开 - 错题本页面</button>
    <button onclick="showAllPages()">同时显示3个网页</button>
</div>

<!-- 3个网页的显示容器 -->
<div class="pages-container" id="pagesContainer">
    <!-- 默认显示3个网页 -->
    <div class="page-item">
        <iframe src="index.html" title="单词训练主页面"></iframe>
    </div>
    <div class="page-item">
        <iframe src="TwoCode.html" title="挪车付费页面"></iframe>
    </div>
    <div class="page-item">
        <iframe src="errorBook.html" title="错题本页面"></iframe>
    </div>
</div>

<script>
    // 单独打开某个网页（新标签页）
    function openSinglePage(pageName) {
        window.open(`https://wordtrainer.github.io/${pageName}`, '_blank');
    }
    
    // 同时显示3个网页（重置容器内容）
    function showAllPages() {
        const container = document.getElementById('pagesContainer');
        container.innerHTML = `
            <div class="page-item"><iframe src="index.html" title="单词训练主页面"></iframe></div>
            <div class="page-item"><iframe src="TwoCode.html" title="挪车付费页面"></iframe></div>
            <div class="page-item"><iframe src="errorBook.html" title="错题本页面"></iframe></div>
        `;
    }
</script>
</body>
</html>
